<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>Ravinto</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111111;
  --bg2: #1a1a1a;
  --bg3: #222222;
  --bg4: #2a2a2a;
  --border: #2e2e2e;
  --border2: #3a3a3a;
  --accent: #e8b84b;
  --accent-dim: rgba(232,184,75,0.15);
  --accent-dark: #c9a040;
  --text: #f0f0f0;
  --text2: #aaaaaa;
  --text3: #666666;
  --green: #4caf7a;
  --green-dim: rgba(76,175,122,0.15);
  --red: #e85b4b;
  --red-dim: rgba(232,91,75,0.15);
  --blue: #4b8be8;
  --blue-dim: rgba(75,139,232,0.15);
  --purple: #9b6cf5;
  --r: 14px;
  --r-sm: 9px;
  --shadow: 0 4px 20px rgba(0,0,0,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:500px;margin:0 auto;overflow-x:hidden;}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:'Inter',sans-serif;color:var(--text);background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:12px 14px;font-size:15px;width:100%;outline:none;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:60px;}
select option{background:var(--bg3);}

/* ── ONBOARDING ── */
#onboarding{display:flex;flex-direction:column;min-height:100vh;padding:0;}
.ob-header{padding:20px 24px 0;display:flex;align-items:center;gap:12px;}
.ob-logo{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.ob-logo-text{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.ob-logo-text span{color:var(--accent);}
.ob-progress{padding:24px 24px 0;display:flex;gap:6px;}
.ob-step{flex:1;height:3px;border-radius:2px;background:var(--border2);transition:background .3s;}
.ob-step.done{background:var(--accent);}
.ob-body{flex:1;padding:28px 24px;}
.ob-step-label{font-size:12px;font-weight:600;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.ob-title{font-size:26px;font-weight:800;line-height:1.2;margin-bottom:6px;}
.ob-sub{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.5;}
.ob-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
.ob-field{margin-bottom:16px;}
.ob-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.ob-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;}
.gender-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.gender-btn{padding:16px;border-radius:var(--r);border:2px solid var(--border2);background:var(--bg3);display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .2s;cursor:pointer;}
.gender-btn .g-emoji{font-size:28px;}
.gender-btn .g-label{font-size:14px;font-weight:600;}
.gender-btn.active{border-color:var(--accent);background:var(--accent-dim);}
.goal-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.goal-card{padding:16px 18px;border-radius:var(--r);border:2px solid var(--border2);background:var(--bg3);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;}
.goal-card .g-icon{font-size:26px;width:44px;height:44px;background:var(--bg4);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.goal-card .g-info h4{font-size:15px;font-weight:700;margin-bottom:2px;}
.goal-card .g-info p{font-size:12px;color:var(--text2);}
.goal-card.active{border-color:var(--accent);background:var(--accent-dim);}
.macro-toggle{display:flex;background:var(--bg3);border-radius:var(--r-sm);padding:3px;margin-bottom:20px;}
.macro-toggle button{flex:1;padding:9px;border-radius:6px;font-size:13px;font-weight:600;transition:all .2s;color:var(--text2);}
.macro-toggle button.active{background:var(--accent);color:#111;}
.macro-display{background:var(--bg3);border-radius:var(--r);padding:16px;margin-bottom:16px;}
.macro-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.mpill{background:var(--bg4);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;}
.mpill span{color:var(--accent);}
.meal-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.meal-chip{padding:8px 16px;border-radius:20px;border:2px solid var(--border2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;background:var(--bg3);}
.meal-chip.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}
.restrict-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.rtag{padding:8px 14px;border-radius:20px;border:2px solid var(--border2);font-size:13px;cursor:pointer;transition:all .2s;background:var(--bg3);}
.rtag.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}
.ob-footer{padding:20px 24px 32px;}
.btn-primary{width:100%;padding:16px;border-radius:var(--r);background:var(--accent);color:#111;font-size:16px;font-weight:700;letter-spacing:-0.3px;transition:all .2s;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.macro-calc-hint{font-size:12px;color:var(--accent);margin-top:-10px;margin-bottom:14px;padding:8px 12px;background:var(--accent-dim);border-radius:var(--r-sm);}

/* ── MAIN APP ── */
#app{display:none;flex-direction:column;min-height:100vh;padding-bottom:80px;}

/* Macro strip */
.macro-strip{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100;}
.ms-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ms-greeting{font-size:13px;font-weight:600;color:var(--text2);}
.ms-kcal{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.ms-kcal span{font-size:13px;font-weight:500;color:var(--text2);}
.ms-macros{display:flex;gap:10px;}
.ms-macro{flex:1;}
.ms-macro-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
.ms-macro-val{font-size:13px;font-weight:700;margin-bottom:4px;}
.ms-macro-val em{font-weight:400;color:var(--text2);font-style:normal;}
.ms-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.ms-bar-fill{height:100%;border-radius:2px;transition:width .4s;}
.ms-bar-fill.protein{background:var(--blue);}
.ms-bar-fill.carbs{background:var(--accent);}
.ms-bar-fill.fat{background:var(--green);}

/* Tab bar */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--bg2);border-top:1px solid var(--border);padding:8px 20px 12px;display:flex;gap:4px;z-index:200;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px;border-radius:10px;transition:all .2s;cursor:pointer;color:var(--text3);}
.tab-btn.active{color:var(--accent);}
.tab-btn .t-icon{font-size:20px;}
.tab-btn .t-label{font-size:10px;font-weight:600;letter-spacing:.3px;}

/* Tab content */
.tab-content{display:none;padding:20px;}
.tab-content.active{display:block;}

/* Program tab */
.program-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ph-title{font-size:22px;font-weight:800;}
.training-toggle{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:20px;padding:6px 12px;cursor:pointer;}
.tt-label{font-size:12px;font-weight:600;color:var(--text2);}
.tt-switch{width:32px;height:18px;background:var(--border2);border-radius:9px;position:relative;transition:background .2s;}
.tt-switch.on{background:var(--accent);}
.tt-switch::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:7px;transition:left .2s;}
.tt-switch.on::after{left:16px;}

.meal-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden;}
.meal-card.preworkout{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.mc-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.mc-meal-name{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.3px;}
.mc-pw-badge{font-size:10px;font-weight:700;background:var(--accent-dim);color:var(--accent);padding:3px 8px;border-radius:10px;letter-spacing:.5px;}
.mc-options{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px;}
.meal-option{background:var(--bg3);border-radius:var(--r-sm);padding:12px;cursor:pointer;transition:all .2s;border:1.5px solid transparent;display:flex;align-items:center;gap:12px;}
.meal-option:hover{border-color:var(--border2);}
.meal-option.selected{border-color:var(--accent);background:var(--accent-dim);}
.mo-emoji{font-size:26px;width:44px;height:44px;background:var(--bg4);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mo-info{flex:1;min-width:0;}
.mo-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.mo-meta{display:flex;gap:8px;flex-wrap:wrap;}
.mo-pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap;}
.mo-pill.kcal{background:rgba(240,240,240,.08);color:var(--text2);}
.mo-pill.p{background:var(--blue-dim);color:var(--blue);}
.mo-pill.c{background:var(--accent-dim);color:var(--accent);}
.mo-pill.f{background:var(--green-dim);color:var(--green);}
.mo-time{font-size:11px;color:var(--text3);margin-top:3px;}
.mo-arrow{color:var(--text3);font-size:14px;}

.mc-btns{display:flex;gap:8px;margin:4px 0 0;}
.mc-ai-btn,.mc-custom-btn{flex:1;padding:11px;border-radius:var(--r-sm);background:transparent;border:1.5px dashed var(--border2);color:var(--text2);font-size:13px;font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;}
.mc-ai-btn:hover{border-color:var(--accent);color:var(--accent);}
.mc-ai-btn.loading{pointer-events:none;opacity:.6;}
.mc-custom-btn:hover{border-color:var(--green);color:var(--green);}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--accent-dim);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}

/* Recipe modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:flex-end;backdrop-filter:blur(4px);}
.recipe-modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:32px;}
.recipe-img{width:100%;height:200px;object-fit:cover;background:var(--bg3);}
.recipe-img-placeholder{width:100%;height:200px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:64px;}
.rm-body{padding:20px 20px 0;}
.rm-close{position:absolute;top:16px;right:16px;width:32px;height:32px;background:rgba(0,0,0,.6);border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.rm-emoji-wrap{position:relative;}
.rm-title{font-size:22px;font-weight:800;margin-bottom:6px;}
.rm-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.rm-macros{background:var(--bg3);border-radius:var(--r);padding:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;text-align:center;}
.rm-macro h4{font-size:18px;font-weight:800;margin-bottom:2px;}
.rm-macro p{font-size:11px;color:var(--text2);font-weight:600;}
.rm-macro.kcal h4{color:var(--text);}
.rm-macro.prot h4{color:var(--blue);}
.rm-macro.carb h4{color:var(--accent);}
.rm-macro.fat h4{color:var(--green);}
.rm-section-title{font-size:14px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.rm-ingredients{margin-bottom:16px;}
.rm-ingredient{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.ri-amount{font-size:13px;font-weight:700;color:var(--accent);min-width:56px;}
.ri-name{font-size:13px;}
.rm-instructions{font-size:14px;line-height:1.7;color:var(--text2);margin-bottom:8px;}
.rm-select-btn{width:100%;margin-top:16px;padding:15px;border-radius:var(--r);background:var(--accent);color:#111;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;}
.rm-select-btn:hover{background:var(--accent-dark);}
.rm-delete-btn{width:100%;margin-top:8px;padding:12px;border-radius:var(--r);background:transparent;border:1.5px solid var(--red);color:var(--red);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.rm-delete-btn:hover{background:var(--red-dim);}

/* Custom meal modal */
.custom-modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:24px 20px 32px;}
.cm-title{font-size:20px;font-weight:800;margin-bottom:4px;}
.cm-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.cm-field{margin-bottom:14px;}
.cm-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;}
.cm-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cm-row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
.cm-emoji-picker{display:flex;gap:6px;flex-wrap:wrap;}
.cm-emoji-opt{width:40px;height:40px;border-radius:10px;border:2px solid var(--border2);background:var(--bg3);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.cm-emoji-opt.active{border-color:var(--accent);background:var(--accent-dim);}
.cm-ingredient-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.cm-ingredient-row input:first-child{width:80px;flex-shrink:0;}
.cm-ingredient-row input:last-of-type{flex:1;}
.cm-remove-ing{width:32px;height:32px;border-radius:8px;background:var(--red-dim);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;}
.cm-add-ing{padding:8px 14px;border-radius:var(--r-sm);border:1.5px dashed var(--border2);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:4px;background:transparent;}
.cm-add-ing:hover{border-color:var(--accent);color:var(--accent);}
.cm-actions{display:flex;gap:10px;margin-top:20px;}
.cm-cancel{flex:1;padding:14px;border-radius:var(--r);background:var(--bg3);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;}
.cm-save{flex:1;padding:14px;border-radius:var(--r);background:var(--accent);color:#111;font-size:14px;font-weight:700;cursor:pointer;}

/* Weight tab */
.weight-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.wh-title{font-size:22px;font-weight:800;}
.weight-log-form{background:var(--bg2);border-radius:var(--r);padding:18px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-end;}
.wlf-field{flex:1;}
.wlf-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
.wlf-input{background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:11px 14px;font-size:18px;font-weight:700;color:var(--text);width:100%;outline:none;transition:border-color .2s;}
.wlf-input:focus{border-color:var(--accent);}
.wlf-btn{padding:12px 18px;background:var(--accent);color:#111;border-radius:var(--r-sm);font-size:14px;font-weight:700;flex-shrink:0;cursor:pointer;}
.weight-chart-wrap{background:var(--bg2);border-radius:var(--r);padding:18px;margin-bottom:16px;}
.wc-title{font-size:14px;font-weight:700;margin-bottom:14px;}
.weight-chart{width:100%;height:120px;}
.weight-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.ws-card{background:var(--bg2);border-radius:var(--r);padding:16px;}
.ws-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:4px;}
.ws-val{font-size:24px;font-weight:800;}
.ws-val.up{color:var(--red);}
.ws-val.down{color:var(--green);}
.ws-val.neutral{color:var(--text);}
.ws-sub{font-size:12px;color:var(--text3);}
.ai-comment{background:var(--bg2);border-radius:var(--r);padding:16px;border-left:3px solid var(--accent);}
.ai-comment-label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.ai-comment-text{font-size:14px;line-height:1.6;color:var(--text2);}

/* Settings tab */
.settings-section{margin-bottom:24px;}
.ss-title{font-size:13px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;}
.ss-card{background:var(--bg2);border-radius:var(--r);overflow:hidden;}
.ss-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.ss-row:last-child{border-bottom:none;}
.ss-row-label{font-size:14px;font-weight:600;}
.ss-row-val{font-size:14px;color:var(--text2);}
.ss-input{background:transparent;border:none;border-bottom:1px solid var(--border2);border-radius:0;padding:4px 8px;width:90px;text-align:right;font-size:14px;color:var(--text);font-weight:600;}
.ss-input:focus{border-color:var(--accent);outline:none;}
.btn-reset{width:100%;padding:14px;border-radius:var(--r);background:var(--red-dim);color:var(--red);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;border:1.5px solid var(--red);}
.btn-reset:hover{background:var(--red);}

.empty-state{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-state .es-icon{font-size:48px;margin-bottom:12px;}
.empty-state p{font-size:14px;line-height:1.6;}

/* Weight log entries */
.weight-entries{background:var(--bg2);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.we-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);}
.we-row:last-child{border-bottom:none;}
.we-date{font-size:13px;color:var(--text2);}
.we-val{font-size:16px;font-weight:700;}
.we-diff{font-size:12px;font-weight:600;}
.we-diff.up{color:var(--red);}
.we-diff.down{color:var(--green);}

/* Animations */
@keyframes slide-up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
.slide-up{animation:slide-up .3s ease both;}
.fade-in{animation:fade-in .2s ease both;}
@keyframes pop-in{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.pop-in{animation:pop-in .3s cubic-bezier(.34,1.56,.64,1) both;}

.new-badge{font-size:10px;font-weight:700;background:var(--accent);color:#111;padding:2px 7px;border-radius:6px;margin-left:8px;}
.custom-badge{font-size:10px;font-weight:700;background:var(--green);color:#111;padding:2px 7px;border-radius:6px;margin-left:8px;}

/* Ainesosahaku custom-mealissa */
.cm-ing-search{margin-bottom:0;border-radius:var(--r-sm) var(--r-sm) 0 0;}
.cm-ing-results{max-height:180px;overflow-y:auto;background:var(--bg3);border:1px solid var(--border2);border-top:none;border-radius:0 0 var(--r-sm) var(--r-sm);display:none;}
.cm-ing-results.open{display:block;}
.cm-ing-result{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:13px;transition:background .15s;}
.cm-ing-result:hover{background:var(--accent-dim);}
.cm-ing-result:last-child{border-bottom:none;}
.cm-ing-result .ir-left{display:flex;flex-direction:column;gap:1px;}
.cm-ing-result .ir-name{font-weight:600;}
.cm-ing-result .ir-cat{font-size:11px;color:var(--text3);}
.cm-ing-result .ir-macros{font-size:11px;color:var(--text2);text-align:right;}
.cm-ing-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:var(--bg4);padding:10px 12px;border-radius:var(--r-sm);}
.cm-ing-row .cm-ing-amount{width:56px;text-align:center;padding:6px 4px;font-size:14px;font-weight:700;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;}
.cm-ing-row .cm-ing-unit{font-size:12px;color:var(--text3);min-width:12px;}
.cm-ing-row .cm-ing-name{flex:1;font-size:13px;font-weight:600;}
.cm-ing-row .cm-ing-macros{font-size:11px;color:var(--text2);white-space:nowrap;}
.cm-macro-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.cm-macro-pill{background:var(--bg4);padding:10px 12px;border-radius:var(--r-sm);font-size:13px;font-weight:700;text-align:center;}

/* Hakutabit: Tietokanta / Kauppa */
.cm-search-tabs{display:flex;gap:0;background:var(--bg3);border-radius:var(--r-sm);padding:3px;margin-bottom:8px;}
.cm-search-tab{flex:1;padding:8px;border-radius:6px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;transition:all .2s;color:var(--text2);}
.cm-search-tab.active{background:var(--accent);color:#111;}
.cm-api-badge{display:inline-block;font-size:9px;font-weight:700;background:var(--green-dim);color:var(--green);padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle;}
.cm-ing-result .ir-brand{font-size:11px;color:var(--accent);font-weight:600;}

/* Ateriarakenne-valinta onboardingissa */
.meal-structure{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.meal-slot-btn{padding:12px 16px;border-radius:var(--r-sm);border:2px solid var(--border2);background:var(--bg3);display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;}
.meal-slot-btn.active{border-color:var(--accent);background:var(--accent-dim);}
.meal-slot-btn .ms-emoji{font-size:22px;}
.meal-slot-btn .ms-label{font-size:14px;font-weight:600;flex:1;}
.meal-slot-btn .ms-check{width:22px;height:22px;border:2px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;transition:all .2s;}
.meal-slot-btn.active .ms-check{border-color:var(--accent);background:var(--accent);color:#111;}
.training-mode-section{margin-top:20px;}
.tm-options{display:flex;flex-direction:column;gap:8px;}
.tm-option{padding:14px 16px;border-radius:var(--r-sm);border:2px solid var(--border2);background:var(--bg3);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;}
.tm-option.active{border-color:var(--accent);background:var(--accent-dim);}
.tm-option .tm-info{flex:1;}
.tm-option .tm-info h4{font-size:14px;font-weight:700;margin-bottom:2px;}
.tm-option .tm-info p{font-size:12px;color:var(--text2);}
.tm-option .tm-radio{width:18px;height:18px;border:2px solid var(--border2);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.tm-option.active .tm-radio{border-color:var(--accent);}
.tm-option.active .tm-radio::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--accent);}

/* Piilota rumat native number-spinnerit */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}

/* Custom number stepper */
.num-input-wrap{display:flex;align-items:stretch;background:var(--bg3);border-radius:var(--r-sm);border:1.5px solid var(--border2);overflow:hidden;transition:border-color .2s;}
.num-input-wrap:focus-within{border-color:var(--accent);}
.num-input-wrap input{border:none;border-radius:0;text-align:center;flex:1;padding:12px 4px;font-weight:700;font-size:18px;background:transparent;width:0;min-width:0;}
.num-input-wrap input:focus{outline:none;}
.num-btn{width:44px;font-size:22px;font-weight:700;color:var(--accent);background:var(--bg4);flex-shrink:0;cursor:pointer;transition:background .15s;line-height:1;}
.num-btn:active{background:var(--accent-dim);}

/* AI error toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:12px 20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%;}
.toast.show{opacity:1;}
.toast.error{border-color:var(--red);color:var(--red);}
.toast.success{border-color:var(--green);color:var(--green);}

/* Confirm dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;}
.confirm-box{background:var(--bg2);border-radius:var(--r);padding:24px;width:100%;max-width:320px;border:1px solid var(--border2);}
.confirm-msg{font-size:15px;font-weight:600;margin-bottom:20px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;}
.confirm-cancel{flex:1;padding:12px;border-radius:var(--r-sm);background:var(--bg3);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;}
.confirm-ok{flex:1;padding:12px;border-radius:var(--r-sm);background:var(--red);color:#fff;font-size:14px;font-weight:700;cursor:pointer;}

/* Profile save button */
.btn-save-profile{width:100%;padding:12px;border-radius:var(--r);background:var(--accent-dim);color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;border:1.5px solid var(--accent);margin-top:10px;}
.btn-save-profile:hover{background:var(--accent);color:#111;}

/* ── DIARY TAB ── */
.diary-week-strip{display:flex;gap:4px;margin-bottom:14px;background:var(--bg2);border-radius:var(--r);padding:8px;}
.diary-day-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:7px 2px;border-radius:var(--r-sm);cursor:pointer;transition:all .2s;background:transparent;color:var(--text2);border:none;font-family:'Inter',sans-serif;}
.diary-day-btn:hover{background:var(--bg3);}
.diary-day-btn.active{background:var(--accent);color:#111;}
.diary-day-btn.today{border:1.5px solid var(--accent);}
.diary-day-btn .dd-weekday{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.diary-day-btn .dd-date{font-size:15px;font-weight:800;}
/* Diary day summary */
.diary-day-summary{background:var(--bg2);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:16px;}
.dds-kcal{font-size:24px;font-weight:800;white-space:nowrap;}
.dds-kcal small{font-size:11px;font-weight:500;color:var(--text2);display:block;margin-top:1px;}
.dds-macros{flex:1;display:flex;flex-direction:column;gap:5px;}
.dds-bar-row{display:flex;align-items:center;gap:6px;}
.dds-bar-label{font-size:10px;font-weight:700;width:22px;}
.dds-bar{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.dds-bar-fill{height:100%;border-radius:2px;transition:width .4s;}
.dds-bar-pct{font-size:10px;font-weight:600;color:var(--text2);width:30px;text-align:right;}
/* Diary slot sections */
.diary-slot{background:var(--bg2);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.diary-slot-hdr{display:flex;align-items:center;gap:10px;padding:13px 14px;}
.diary-slot-icon{font-size:19px;}
.diary-slot-title{flex:1;font-size:15px;font-weight:700;}
.diary-slot-kcal{font-size:11px;font-weight:600;color:var(--text3);}
.diary-slot-add{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:none;color:var(--text);font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0;transition:all .2s;}
.diary-slot-add:hover{background:var(--accent);color:#111;}
.diary-slot-items{padding:0 12px 10px;}
.diary-slot-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--border);}
.dsi-emoji{font-size:17px;width:30px;text-align:center;flex-shrink:0;}
.dsi-info{flex:1;min-width:0;}
.dsi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dsi-macros{font-size:11px;color:var(--text2);}
.dsi-remove{width:24px;height:24px;border-radius:6px;background:transparent;border:none;color:var(--text3);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .2s;}
.dsi-remove:hover{color:var(--red);}
.diary-slot-empty{padding:2px 14px 12px;font-size:12px;color:var(--text3);font-style:italic;}
/* Week average strip */
.diary-week-avg{background:var(--bg3);border-radius:var(--r);padding:14px 16px;margin-top:8px;}
.dwa-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px;}
.dwa-row{display:flex;gap:8px;}
.dwa-item{flex:1;text-align:center;}
.dwa-val{font-size:15px;font-weight:800;}
.dwa-label{font-size:10px;color:var(--text3);}
/* Calendar button */
.diary-cal-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:var(--r-sm);background:var(--bg2);border:1px solid var(--border2);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.diary-cal-btn:hover{border-color:var(--accent);color:var(--accent);}
/* Diary add modal */
.diary-add-modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:20px 20px 40px;}
.dam-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.dam-title{font-size:18px;font-weight:800;}
.dam-close{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:none;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;}
.dam-tabs{display:flex;background:var(--bg3);border-radius:var(--r-sm);padding:3px;margin-bottom:14px;}
.dam-tab{flex:1;padding:8px;border-radius:6px;font-size:12px;font-weight:600;transition:all .2s;color:var(--text2);background:transparent;border:none;cursor:pointer;font-family:'Inter',sans-serif;}
.dam-tab.active{background:var(--accent);color:#111;}
.dam-plan-item{background:var(--bg3);border-radius:var(--r-sm);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;border:1.5px solid transparent;}
.dam-plan-item:hover{border-color:var(--accent);}
.dam-plan-item-name{font-size:14px;font-weight:600;margin-bottom:3px;}
.dam-plan-item-macros{font-size:11px;color:var(--text2);}
.dam-search-wrap{position:relative;margin-bottom:12px;}
.dam-search-input{width:100%;padding:11px 14px 11px 38px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r-sm);font-size:14px;color:var(--text);outline:none;transition:border-color .2s;font-family:'Inter',sans-serif;}
.dam-search-input:focus{border-color:var(--accent);}
.dam-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;}
.dam-search-results{display:flex;flex-direction:column;gap:6px;}
.dam-search-result{background:var(--bg3);border-radius:var(--r-sm);padding:11px 13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;border:1.5px solid transparent;}
.dam-search-result:hover{border-color:var(--accent);}
.dam-sr-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.dam-sr-cat{font-size:11px;color:var(--text3);}
.dam-sr-macros{font-size:11px;color:var(--text2);text-align:right;flex-shrink:0;margin-left:8px;}
.dam-manual-field{margin-bottom:12px;}
.dam-manual-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;}
.dam-manual-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.dam-save-btn{width:100%;padding:14px;border-radius:var(--r);background:var(--accent);color:#111;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:background .2s;}
.dam-save-btn:hover{background:var(--accent-dark);}
/* Calendar modal */
.cal-modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 16px 32px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:none;color:var(--text);font-size:18px;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;}
.cal-month-label{font-size:16px;font-weight:800;}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-wd{text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:3px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:18px;}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;padding:2px;}
.cal-cell.empty{pointer-events:none;}
.cal-cell:hover:not(.empty){background:var(--bg3);}
.cal-cell.today-cell{border:1.5px solid var(--accent);}
.cal-cell.selected-cell{background:var(--accent);}
.cal-cell.selected-cell .cal-cell-num{color:#111;}
.cal-cell-num{font-size:12px;font-weight:700;}
.cal-cell-dot{width:5px;height:5px;border-radius:50%;margin-top:2px;}
.cal-cell-dot.green{background:var(--green);}
.cal-cell-dot.yellow{background:var(--accent);}
.cal-cell-dot.red{background:var(--red);}
.cal-cell-dot.none{background:transparent;}
.cal-week-avg{background:var(--bg3);border-radius:var(--r);padding:14px;margin-bottom:14px;}
.cal-week-avg-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.cal-avg-row{display:flex;gap:8px;}
.cal-avg-item{flex:1;text-align:center;}
.cal-avg-val{font-size:16px;font-weight:800;}
.cal-avg-label{font-size:10px;color:var(--text3);margin-top:1px;}
.cal-close-btn{width:100%;padding:13px;border-radius:var(--r);background:var(--bg3);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;}

/* ── DAY NAVIGATION ── */
.day-nav{display:flex;align-items:center;gap:8px;}
.day-nav-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .2s;color:var(--text);font-family:'Inter',sans-serif;}
.day-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.day-nav-label{font-size:13px;font-weight:600;color:var(--text2);min-width:80px;text-align:center;}

/* ── AI PREFERENCE FORM ── */
.ai-pref-form{background:var(--bg3);border-radius:var(--r-sm);padding:10px 12px;margin-top:6px;display:flex;gap:6px;align-items:center;}
.ai-pref-form input{flex:1;padding:8px 10px;font-size:12px;background:var(--bg4);border:1px solid var(--border2);border-radius:6px;}
.ai-pref-form button{padding:8px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;border:none;font-family:'Inter',sans-serif;}
.ai-pref-form .aipf-gen{background:var(--accent);color:#111;}
.ai-pref-form .aipf-skip{background:var(--bg4);color:var(--text2);}

/* ── REPORT MODAL ── */
.report-modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:24px 20px 32px;}
.report-title{font-size:20px;font-weight:800;margin-bottom:16px;}
.report-stat{background:var(--bg3);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.report-stat-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.report-stat-val{font-size:22px;font-weight:800;}
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.report-ai{background:var(--bg3);border-left:3px solid var(--accent);border-radius:var(--r);padding:14px;margin-top:12px;}
.report-ai-label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.report-ai-text{font-size:14px;line-height:1.6;color:var(--text2);}
.report-close{width:100%;padding:14px;border-radius:var(--r);background:var(--bg3);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;border:none;font-family:'Inter',sans-serif;}

/* ── SHOPPING LIST MODAL ── */
.shopping-modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:24px 20px 32px;}
.shopping-title{font-size:20px;font-weight:800;margin-bottom:16px;}
.shopping-cat{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin:14px 0 8px;padding-top:8px;border-top:1px solid var(--border);}
.shopping-cat:first-child{border-top:none;margin-top:0;}
.shopping-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.shopping-item:last-child{border-bottom:none;}
.shopping-check{width:24px;height:24px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all .2s;flex-shrink:0;background:transparent;color:var(--text);font-family:'Inter',sans-serif;}
.shopping-check.checked{border-color:var(--green);background:var(--green);color:#111;text-decoration:line-through;}
.shopping-item-name{font-size:14px;flex:1;}
.shopping-item-name.bought{text-decoration:line-through;color:var(--text3);}
.shopping-close{width:100%;padding:14px;border-radius:var(--r);background:var(--bg3);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;border:none;font-family:'Inter',sans-serif;}

/* ── RESTAURANT MODE ── */
.restaurant-fab{position:fixed;bottom:88px;right:calc(50% - 230px);width:52px;height:52px;border-radius:50%;background:var(--accent);color:#111;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(232,184,75,.4);cursor:pointer;z-index:190;transition:transform .2s;border:none;font-family:'Inter',sans-serif;}
.restaurant-fab:hover{transform:scale(1.1);}
.restaurant-modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:24px 20px 32px;}
.restaurant-title{font-size:20px;font-weight:800;margin-bottom:6px;}
.restaurant-sub{font-size:13px;color:var(--text2);margin-bottom:16px;}
.restaurant-remaining{background:var(--bg3);border-radius:var(--r);padding:14px;margin-bottom:16px;}
.restaurant-remaining-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;}
.restaurant-remaining-macros{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;text-align:center;}
.restaurant-remaining-macros .rrm{font-size:13px;font-weight:700;}
.restaurant-remaining-macros .rrm-label{font-size:10px;color:var(--text3);font-weight:600;}
.restaurant-field{margin-bottom:12px;}
.restaurant-field label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;}
.restaurant-actions{display:flex;gap:8px;margin-top:16px;}
.restaurant-actions button{flex:1;padding:14px;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Inter',sans-serif;}
.restaurant-actions .ra-generate{background:var(--accent);color:#111;}
.restaurant-actions .ra-close{background:var(--bg3);color:var(--text2);}
.restaurant-suggestion{background:var(--bg3);border-radius:var(--r);padding:14px;margin-top:12px;border-left:3px solid var(--accent);}
.restaurant-suggestion-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;}
.restaurant-suggestion-text{font-size:14px;line-height:1.6;color:var(--text2);}

/* ── OFFLINE BADGE ── */
.offline-badge{position:fixed;top:8px;right:8px;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;z-index:999;display:none;}
.offline-badge.show{display:block;}

/* ── PWA INSTALL ── */
.pwa-install{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--accent);color:#111;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:700;z-index:300;display:none;cursor:pointer;box-shadow:var(--shadow);border:none;font-family:'Inter',sans-serif;}
</style>
</head>
<body>

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg, type='error') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

// ═══════════════════════════════════════════
// SANITIZE (XSS-suojaus)
// ═══════════════════════════════════════════
function sanitize(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function sanitizeNL(str) {
  return sanitize(str).replace(/\n/g,'<br>');
}

// ═══════════════════════════════════════════
// CONFIRM DIALOG
// ═══════════════════════════════════════════
function showConfirm(msg, onConfirm) {
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-ok-btn').onclick = () => { closeConfirm(); onConfirm(); };
  document.getElementById('confirm-overlay').style.display = 'flex';
}
function closeConfirm() {
  document.getElementById('confirm-overlay').style.display = 'none';
}

// ═══════════════════════════════════════════
// NUMBER STEPPER
// ═══════════════════════════════════════════
function stepInput(id, dir, e) {
  if(e) e.preventDefault();
  const inp = document.getElementById(id);
  if(!inp) return;
  const step = parseFloat(inp.step) || 1;
  const min  = inp.min !== '' ? parseFloat(inp.min) : -Infinity;
  const max  = inp.max !== '' ? parseFloat(inp.max) :  Infinity;
  const cur  = parseFloat(inp.value);
  const base = isNaN(cur) ? (dir > 0 ? min : max) : cur;
  const next = Math.min(max, Math.max(min, Math.round((base + dir * step) * 10) / 10));
  inp.value  = next;
  inp.dispatchEvent(new Event('input'));
}

function numInput(id, val, min, max, step=1, oninputFn='') {
  const oi = oninputFn ? `oninput="${oninputFn}"` : '';
  return `<div class="num-input-wrap">
    <button class="num-btn" type="button" onclick="stepInput('${id}',-1,event)">−</button>
    <input id="${id}" type="number" value="${val}" min="${min}" max="${max}" step="${step}" ${oi}>
    <button class="num-btn" type="button" onclick="stepInput('${id}',1,event)">＋</button>
  </div>`;
}

// Storage: käytä window.storage (Claude.ai) tai localStorage (paikallinen kehitys)
const _hasClaudeStorage = typeof window.storage !== 'undefined' && typeof window.storage.set === 'function';
async function save(key,val){
  try{
    if(_hasClaudeStorage){await window.storage.set(key,JSON.stringify(val));}
    else{localStorage.setItem('ravinto_'+key,JSON.stringify(val));}
  }catch(e){console.warn('Save failed:',key,e);}
}
async function load(key){
  try{
    if(_hasClaudeStorage){const r=await window.storage.get(key);return r?JSON.parse(r.value):null;}
    else{const v=localStorage.getItem('ravinto_'+key);return v?JSON.parse(v):null;}
  }catch(e){return null;}
}

// ═══════════════════════════════════════════
// SMART MACRO CALCULATION
// ═══════════════════════════════════════════
function calcMacros(profile) {
  const {weight,height,age,gender,goal}=profile;
  let bmr;
  if(gender==='male') bmr=13.397*weight+4.799*height-5.677*age+88.362;
  else bmr=9.247*weight+3.098*height-4.330*age+447.593;
  let tdee=bmr*1.55;
  let kcal;
  if(goal==='cut') kcal=tdee-400;
  else if(goal==='bulk') kcal=tdee+400;
  else kcal=tdee;
  kcal=Math.round(kcal/10)*10;
  const protein=Math.round(weight*2.0);
  const fat=Math.round((kcal*0.25)/9);
  const carbs=Math.round((kcal-protein*4-fat*9)/4);
  return {kcal,protein,carbs,fat};
}

// Derive missing macro from the other three
function deriveMacros(kcal,protein,fat) {
  if(!kcal||kcal<=0) return {carbs:0};
  const pCal=(protein||0)*4;
  const fCal=(fat||0)*9;
  const remaining=kcal-pCal-fCal;
  const carbs=Math.max(0,Math.round(remaining/4));
  return {carbs};
}

// ═══════════════════════════════════════════
// MEAL PLAN GENERATION
// ═══════════════════════════════════════════
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildSchedule(selectedMeals) {
  const meals=selectedMeals.map(id=>AVAILABLE_MEALS.find(m=>m.id===id)).filter(Boolean);
  const totalWeight=meals.reduce((s,m)=>s+m.baseWeight,0);
  return meals.map(m=>({slot:m.label, cat:m.cat, weight:m.baseWeight/totalWeight}));
}

function generateMealPlan(profile) {
  // Käytä selectedMeals-taulukkoa jos löytyy, muuten fallback vanhaan MEAL_SCHEDULES
  let schedule;
  if(profile.selectedMeals && profile.selectedMeals.length){
    schedule=buildSchedule(profile.selectedMeals);
  } else {
    schedule=MEAL_SCHEDULES[profile.mealCount]||MEAL_SCHEDULES[4];
  }
  const macros=profile.macros;
  // Generoi perusateriat normaalisti
  const basePlan=schedule.map(s=>{
    const dbMeals=MEAL_DB[s.cat]||[];
    const targetKcal=macros.kcal*s.weight;
    const targetProtein=macros.protein*s.weight;
    const options=shuffle(dbMeals).slice(0,3).map(m=>{
      const ratio=targetKcal/m.kcal;
      return {...m,kcal:Math.round(m.kcal*ratio/10)*10,protein:Math.round(m.protein*ratio),carbs:Math.round(m.carbs*ratio),fat:Math.round(m.fat*ratio),originalKcal:m.kcal};
    });
    return {slot:s.slot,cat:s.cat,targetKcal,targetProtein,options,isNew:false,isTrainingSnack:false};
  });

  // Treenivälipala: kiinteä ~250 kcal LISÄ (ei vaikuta muihin aterioihin)
  if(profile.trainingMode==='snack'){
    const snackKcal=250;
    const snackProt=Math.round(profile.weight*0.3); // ~30% painosta proteiinia
    const dbMeals=MEAL_DB['Välipala']||[];
    const options=shuffle(dbMeals).slice(0,3).map(m=>{
      const ratio=snackKcal/m.kcal;
      return {...m,kcal:Math.round(m.kcal*ratio/10)*10,protein:Math.round(m.protein*ratio),carbs:Math.round(m.carbs*ratio),fat:Math.round(m.fat*ratio),originalKcal:m.kcal};
    });
    const dinnerIdx=basePlan.findIndex(m=>m.cat==='Päivällinen');
    const insertIdx=dinnerIdx>=0?dinnerIdx:basePlan.length;
    basePlan.splice(insertIdx,0,{slot:'Treenivälipala ⚡',cat:'Välipala',targetKcal:snackKcal,targetProtein:snackProt,options,isNew:false,isTrainingSnack:true});
  }
  return basePlan;
}

    </div>`;

    if(state.obData.macroMode==='auto' && state.obData.weight && state.obData.age && state.obData.gender && state.obData.goal){
      const m=calcMacros({...state.obData,macros:{}});
      html+=`<div class="macro-display">
        <div style="font-size:13px;color:var(--text2);margin-bottom:4px;">Laskettu suositus sinulle</div>
        <div style="font-size:28px;font-weight:800;">${m.kcal} <span style="font-size:16px;color:var(--text2)">kcal</span></div>

    html+=`<div class="restrict-tags">`;

      const active=state.obData.restrictions.includes(r);
      html+=`<button class="rtag ${active?'active':''}" onclick="toggleRestriction('${r}')">${r}</button>`;
    });

  }

  body.innerHTML=html;
  const btn=document.getElementById('ob-next-btn');

function recalcManualCarbs() {
  const kcal=parseInt(document.getElementById('ob-kcal')?.value)||0;
  const prot=parseInt(document.getElementById('ob-protein')?.value)||0;
  const fat=parseInt(document.getElementById('ob-fat')?.value)||0;
  state.obData.manualKcal=kcal||undefined;
  state.obData.manualProtein=prot||undefined;
  state.obData.manualFat=fat||undefined;
  if(kcal>0 && (prot>0||fat>0)){
    const derived=deriveMacros(kcal,prot,fat);
    state.obData.manualCarbs=derived.carbs;
    const carbsInput=document.getElementById('ob-carbs');
    if(carbsInput) carbsInput.value=derived.carbs;
    const hints=document.querySelectorAll('.macro-calc-hint');
    if(hints.length) hints[0].innerHTML=`⚡ Hiilihydraatit lasketaan automaattisesti: <strong>${derived.carbs}g</strong> (${kcal} kcal − ${prot}×4 P − ${fat}×9 R) ÷ 4`;
  }
}

function collectStep1Fields(){
  // Tallenna kenttien nykyiset arvot stateen ennen re-render
  const name=document.getElementById('ob-name')?.value.trim();
  const age=parseFloat(document.getElementById('ob-age')?.value);
  const weight=parseFloat(document.getElementById('ob-weight')?.value);
  const height=parseFloat(document.getElementById('ob-height')?.value);
  if(name) state.obData.name=name;
  if(!isNaN(age)) state.obData.age=age;
  if(!isNaN(weight)) state.obData.weight=weight;
  if(!isNaN(height)) state.obData.height=height;
}

function selectGender(g){collectStep1Fields();state.obData.gender=g;renderOnboarding();}
function selectGoal(g){state.obData.goal=g;renderOnboarding();}
function setMacroMode(m){state.obData.macroMode=m;renderOnboarding();}
function setMealCount(n){state.obData.mealCount=n;renderOnboarding();}
function toggleMealSlot(id){
  const idx=state.obData.selectedMeals.indexOf(id);
  if(idx>=0){
    if(state.obData.selectedMeals.length<=2){showToast('Vähintään 2 ateriaa vaaditaan','error');return;}
    state.obData.selectedMeals.splice(idx,1);
  } else {
    state.obData.selectedMeals.push(id);
  }
  state.obData.mealCount=state.obData.selectedMeals.length;
  renderOnboarding();
}
function setTrainingMode(mode){state.obData.trainingMode=mode;renderOnboarding();}
function toggleRestriction(r){
  const idx=state.obData.restrictions.indexOf(r);
  if(idx>=0) state.obData.restrictions.splice(idx,1);
  else state.obData.restrictions.push(r);
  renderOnboarding();
}

function collectStep1(){
  const name=document.getElementById('ob-name')?.value.trim();
  const age=parseInt(document.getElementById('ob-age')?.value);
  const weight=parseFloat(document.getElementById('ob-weight')?.value);
  const height=parseFloat(document.getElementById('ob-height')?.value);
  if(!name){showToast('Syötä nimesi','error');return false;}
  if(!age||age<10||age>100){showToast('Syötä kelvollinen ikä','error');return false;}
  if(!weight||weight<30||weight>250){showToast('Syötä kelvollinen paino','error');return false;}
  if(!height||height<100||height>250){showToast('Syötä kelvollinen pituus','error');return false;}
  if(!state.obData.gender){showToast('Valitse sukupuoli','error');return false;}
  Object.assign(state.obData,{name,age,weight,height});
  return true;
}

function collectStep3(){
  if(state.obData.macroMode==='manual'){
    const kcal=parseInt(document.getElementById('ob-kcal')?.value);
    const protein=parseInt(document.getElementById('ob-protein')?.value);
    const fat=parseInt(document.getElementById('ob-fat')?.value);
    if(!kcal){showToast('Aseta kalorit','error');return false;}
    if(!protein){showToast('Aseta proteiini','error');return false;}
    if(!fat){showToast('Aseta rasva','error');return false;}
    const derived=deriveMacros(kcal,protein,fat);
    state.obData.manualKcal=kcal;
    state.obData.manualProtein=protein;
    state.obData.manualFat=fat;
    state.obData.manualCarbs=derived.carbs;
  }
  return true;
}

async function onboardingNext(){
  if(state.obStep===1&&!collectStep1())return;
  if(state.obStep===2&&!state.obData.goal){showToast('Valitse tavoite','error');return;}
  if(state.obStep===3&&!collectStep3())return;
  if(state.obStep<4){state.obStep++;renderOnboarding();return;}

  let macros;
  if(state.obData.macroMode==='manual'){
    macros={kcal:state.obData.manualKcal,protein:state.obData.manualProtein,carbs:state.obData.manualCarbs,fat:state.obData.manualFat};
  } else {
    macros=calcMacros(state.obData);
  }

  const profile={
    name:state.obData.name,age:state.obData.age,weight:state.obData.weight,height:state.obData.height,
    gender:state.obData.gender,goal:state.obData.goal,mealCount:state.obData.mealCount,
    selectedMeals:state.obData.selectedMeals,trainingMode:state.obData.trainingMode,
    restrictions:state.obData.restrictions,macros,
  };

  state.profile=profile;
  state.mealPlan=generateMealPlan(profile);
  state.selectedOptions=state.mealPlan.map(()=>0);
  state.weightLog=[];
  state.trainingDay=false;
  state.diary={};
  state.viewDate=todayISO();
  state.currentDate=todayISO();

  await save('profile',profile);
  await save('mealPlan',state.mealPlan);
  await save('selectedOptions',state.selectedOptions);
  await save('weightLog',state.weightLog);
  await save('diary',state.diary);
  showMainApp();
}

function showMainApp(){

function switchTab(tab){
  state.activeTab=tab;
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('tab-btn-'+tab).classList.add('active');
  if(tab==='diary') renderDiaryTab();
}

function toggleTrainingDay(){
  state.trainingDay=!state.trainingDay;
  document.getElementById('tt-switch').className='tt-switch'+(state.trainingDay?' on':'');
  document.getElementById('tt-label').textContent=state.trainingDay?'Treenipäivä':'Lepopäivä';
  save('trainingDay',state.trainingDay);
  renderMealPlan();renderMacroStrip();
}

// ── Macro strip ──
function renderMacroStrip(){
  const p=state.profile;if(!p)return;
  const m=p.macros;
  const trainingMode=p.trainingMode||'boost';
  const boost=(state.trainingDay && trainingMode==='boost')?1.07:1.0;
  const tKcal=Math.round(m.kcal*boost);
  const tProt=Math.round(m.protein*boost);
  const tCarbs=Math.round(m.carbs*boost);
  const tFat=Math.round(m.fat*boost);

  // Use diary data for today if available
  const today=todayISO();
  const diaryToday=state.diary[today];
  let eaten;
  if(diaryToday && (Object.keys(diaryToday.eaten||{}).length>0 || (diaryToday.freeEntries||[]).length>0)){
    eaten=calcDiaryEaten(today);
  } else {
    // No diary entries = show 0/target to encourage logging
    eaten={kcal:0,protein:0,carbs:0,fat:0};
  }

  const pProt=Math.min(100,Math.round(eaten.protein/tProt*100));
  const pCarbs=Math.min(100,Math.round(eaten.carbs/tCarbs*100));
  const pFat=Math.min(100,Math.round(eaten.fat/tFat*100));
  const hour=new Date().getHours();
  const greeting=hour<12?'Hyvää huomenta ☀️':hour<17?'Hyvää päivää 🌤️':'Hyvää iltaa 🌙';

  document.getElementById('macro-strip').innerHTML=`
    <div class="ms-top">
      <div class="ms-greeting">${greeting}, ${sanitize(p.name.split(' ')[0])}${state.trainingDay?' 💪':''}</div>
      <div class="ms-kcal">${eaten.kcal} <span>/ ${tKcal} kcal</span></div>
    </div>
    <div class="ms-macros">
      <div class="ms-macro"><div class="ms-macro-label">Proteiini</div><div class="ms-macro-val">${eaten.protein}<em>/${tProt}g</em></div><div class="ms-bar"><div class="ms-bar-fill protein" style="width:${pProt}%"></div></div></div>
      <div class="ms-macro"><div class="ms-macro-label">HH</div><div class="ms-macro-val">${eaten.carbs}<em>/${tCarbs}g</em></div><div class="ms-bar"><div class="ms-bar-fill carbs" style="width:${pCarbs}%"></div></div></div>
      <div class="ms-macro"><div class="ms-macro-label">Rasva</div><div class="ms-macro-val">${eaten.fat}<em>/${tFat}g</em></div><div class="ms-bar"><div class="ms-bar-fill fat" style="width:${pFat}%"></div></div></div>
    </div>`;
}

// ── Meal Plan ──
function renderMealPlan(){
  const container=document.getElementById('meal-plan-container');
  if(!state.mealPlan.length){container.innerHTML='<div class="empty-state"><div class="es-icon">🍽️</div><p>Ei aterioita</p></div>';return;}
  const pwIdx=PREWORKOUT_SLOTS[state.profile?.mealCount||4];
  const isOffline=!navigator.onLine;

  const trainingMode=state.profile?.trainingMode||'boost';

  // Shopping list button
  const shoppingBtn=`<button class="diary-btn" onclick="renderShoppingList()" style="margin-bottom:14px;">🛒 Ostoslista</button>`;

  container.innerHTML=shoppingBtn+state.mealPlan.map((meal,mi)=>{
    // Piilota treenivälipala lepopäivänä tai boost-moodissa
    if(meal.isTrainingSnack && (!state.trainingDay || trainingMode==='boost')) return '';
    const isPW=meal.isTrainingSnack && state.trainingDay;
    return `
      <div class="meal-card ${isPW?'preworkout':''} slide-up" style="animation-delay:${mi*60}ms">

          <div class="mc-meal-name">🕐 ${meal.slot.toUpperCase()}</div>

// Day navigation
function getViewDate(){ return state.viewDate||todayISO(); }
function getViewDateLabel(){
  const vd=getViewDate();
  const today=todayISO();
  const yesterday=shiftDate(today,-1);
  const tomorrow=shiftDate(today,1);
  if(vd===today) return 'Tänään';
  if(vd===yesterday) return 'Eilen';
  if(vd===tomorrow) return 'Huomenna';
  const d=new Date(vd+'T12:00:00');
  return d.toLocaleDateString('fi-FI',{weekday:'short',day:'numeric',month:'short'});
}

function navDay(dir){
  state.viewDate=shiftDate(getViewDate(),dir);

}

async function requestAiIdea(mi,preference){
  const meal=state.mealPlan[mi];
  const profile=state.profile;
  const existing=meal.options.map(o=>o.name).join(', ');
  const btn=document.getElementById('ai-btn-'+mi);
  if(!btn)return;

  // Close preference form
  const prefContainer=document.getElementById('ai-pref-'+mi);
  if(prefContainer) prefContainer.innerHTML='';

  // Show loading
  btn.innerHTML='<span class="spinner"></span> Generoidaan...';
  btn.classList.add('loading');

  const tKcal  = Math.round(meal.targetKcal);
  const tProt  = Math.round(meal.targetProtein);
  const tFat   = Math.round((meal.targetKcal * 0.25) / 9);
  const tCarbs = Math.round((meal.targetKcal - tProt*4 - tFat*9) / 4);

  const prefText=preference?`\nKäyttäjän toive: ${preference}`:'';

  const systemPrompt=`Olet suomalainen ravintoneuvoja. Generoi YKSI uusi ateriavaihtoehto JSON-muodossa.
Vastaa VAIN JSON-objektilla, ei mitään muuta. Ei Markdown-backtickejä.
JSON-muoto: {"name":"Aterian nimi","kcal":${tKcal},"protein":${tProt},"carbs":${tCarbs},"fat":${tFat},"emoji":"🍽️","time":"15 min","mealPrep":false,"ingredients":[{"a":"100g","n":"Ainesosa"}],"instructions":"Valmistusohjeet tähän."}
TÄRKEÄÄ: Laske ainesosien määrät niin että makrot vastaavat TÄSMÄLLEEN annettuja kohdearvoja. Palauta JSON-kentässä kcal=${tKcal}, protein=${tProt}, carbs=${tCarbs}, fat=${tFat}.`;

  const userPrompt=`Generoi ateria kategoriaan: ${meal.cat}
VAADITUT MAKROT (täsmälliset arvot):
  - Kalorit: ${tKcal} kcal
  - Proteiini: ${tProt} g
  - Hiilihydraatit: ${tCarbs} g
  - Rasva: ${tFat} g
Ruokarajoitteet: ${profile.restrictions?.length?profile.restrictions.join(', '):'Ei rajoitteita'}
Aterian tulee olla täysin erilainen kuin: ${existing}${prefText}
Muuta ainesosien määriä niin että yllä olevat makrot toteutuvat.`;

  try {
    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:systemPrompt,
        messages:[{role:"user",content:userPrompt}],
      })
    });

    if(!response.ok) throw new Error(`API error: ${response.status}`);
    const data=await response.json();
    const text=data.content?.map(c=>c.text||'').join('')||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const idea=JSON.parse(clean);

    // Validate
    if(!idea.name||!idea.kcal) throw new Error('Invalid meal data');
    // Skaalaa makrot täsmäämään tavoitteeseen, jos AI poikkeaa
    const ratio = tKcal / idea.kcal;
    idea.kcal    = tKcal;
    idea.protein = Math.round((idea.protein||0) * ratio);
    idea.carbs   = Math.round((idea.carbs||0)   * ratio);
    idea.fat     = Math.round((idea.fat||0)     * ratio);
    idea._new=true;
    meal.options.push(idea);
    await save('mealPlan',state.mealPlan);
    renderMealPlan();
    showToast(`✨ "${idea.name}" lisätty!`,'success');
  } catch(err){
    console.error('AI idea error:',err);
    // Fallback: generoi paikallinen idea tietokannasta
    const fallback=generateLocalIdea(meal);
    if(fallback){
      fallback._new=true;
      meal.options.push(fallback);
      await save('mealPlan',state.mealPlan);
      renderMealPlan();renderMacroStrip();
      showToast(`✨ "${fallback.name}" lisätty (tietokannasta — AI vaatii Claude.ai-ympäristön)`,'success');
    } else {
      showToast('Kaikki tietokannan ateriat on jo käytössä. Kokeile "Oma ateria" -nappia.','error');
    }
    btn.innerHTML='✨ AI idea';
    btn.classList.remove('loading');
  }
}

// Offline fallback: pick a random unused meal from DB
function generateLocalIdea(meal){
  const dbMeals=MEAL_DB[meal.cat]||[];
  const usedNames=new Set(meal.options.map(o=>o.name));
  const unused=dbMeals.filter(m=>!usedNames.has(m.name));
  if(!unused.length) return null;
  const pick=unused[Math.floor(Math.random()*unused.length)];
  const ratio=meal.targetKcal/pick.kcal;
  return {
    ...pick,
    kcal:Math.round(pick.kcal*ratio/10)*10,
    protein:Math.round(pick.protein*ratio),
    carbs:Math.round(pick.carbs*ratio),
    fat:Math.round(pick.fat*ratio),
  };
}

    protein+=ing.per100.protein*r;
    carbs+=ing.per100.carbs*r;
    fat+=ing.per100.fat*r;
  });
  return {kcal:Math.round(kcal),protein:Math.round(protein),carbs:Math.round(carbs),fat:Math.round(fat)};
}

// ── FI-TUOTEVÄLIMUISTI ──
const FI_CACHE_KEY='ravinto_fi_products';
const FI_CACHE_TTL=7*24*60*60*1000; // 7 päivää
let fiProducts=null; // normalisoidut tuotteet muistissa

function normalizeOFFProduct(p){
  const n=p.nutriments;
  return {
    name:p.product_name,
    brand:p.brands?p.brands.split(',')[0].trim():'',
    kcal:Math.round(n['energy-kcal_100g']||n['energy-kcal']||0),
    protein:Math.round((n.proteins_100g||n.proteins||0)*10)/10,
    carbs:Math.round((n.carbohydrates_100g||n.carbohydrates||0)*10)/10,
    fat:Math.round((n.fat_100g||n.fat||0)*10)/10,
  };
}

async function initFiProductCache(){
  // Lataa localStorage-välimuistista jos tuore
  try{
    const raw=localStorage.getItem(FI_CACHE_KEY);
    if(raw){
      const cached=JSON.parse(raw);
      if(Date.now()-cached.ts<FI_CACHE_TTL){fiProducts=cached.products;return;}
    }
  }catch(e){}
  // Hae taustalla 3 sivua (300 suosituinta suomalaista tuotetta)
  try{
    const pages=await Promise.all([1,2,3].map(page=>
      fetch(`https://world.openfoodfacts.org/cgi/search.pl?action=process&json=1&page_size=100&page=${page}&sort_by=unique_scans_n&lc=fi&cc=fi&fields=product_name,brands,nutriments`)
        .then(r=>r.json()).catch(()=>({products:[]}))
    ));
    const all=pages.flatMap(d=>(d.products||[]).filter(p=>{
      const n=p.nutriments;
      return p.product_name&&n&&n['energy-kcal_100g']!==undefined;
    }).map(normalizeOFFProduct));
    fiProducts=all;
    localStorage.setItem(FI_CACHE_KEY,JSON.stringify({ts:Date.now(),products:all}));
  }catch(e){console.warn('FI cache fetch failed:',e);}
}

function searchLocalFiProducts(query){
  if(!fiProducts||!fiProducts.length) return null;
  const q=query.toLowerCase();
  return fiProducts.filter(p=>
    p.name.toLowerCase().includes(q)||(p.brand&&p.brand.toLowerCase().includes(q))
  ).slice(0,8);
}

function renderNormalizedProducts(products){
  const results=document.getElementById('cm-ing-results');
  if(!products||!products.length){
    results.className='cm-ing-results open';
    results.innerHTML='<div style="padding:12px;color:var(--text3);font-size:13px;">Ei tuloksia — kokeile toista hakusanaa</div>';
    return;
  }
  results.className='cm-ing-results open';
  window._offProducts=products;
  results.innerHTML=products.map((p,i)=>`
    <div class="cm-ing-result" onclick="addIngredientFromAPI(${i})">
      <div class="ir-left">
        <div class="ir-name">${sanitize(p.name)}</div>
        ${p.brand?`<div class="ir-brand">${sanitize(p.brand)}</div>`:''}
      </div>
      <div class="ir-macros">${p.kcal} kcal · ${p.protein}g P · ${p.carbs}g HH · ${p.fat}g R<br>per 100g</div>
    </div>`).join('');
}

function searchApiIngredients(query){
  const results=document.getElementById('cm-ing-results');
  if(!query||query.length<3){results.className='cm-ing-results';results.innerHTML='';return;}
  const key=query.trim().toLowerCase();
  // 1. Session-välimuisti
  if(cmSearchCache.has(key)){renderNormalizedProducts(cmSearchCache.get(key));return;}
  // 2. Paikallinen FI-tuotevälimuisti — välitön tulos
  const local=searchLocalFiProducts(key);
  if(local&&local.length>=2){renderNormalizedProducts(local);return;}
  // 3. API-fallback jos ei löydy paikallisesti
  clearTimeout(cmApiTimeout);
  results.className='cm-ing-results open';
  results.innerHTML='<div style="padding:12px;color:var(--text2);font-size:13px;">🔍 Haetaan...</div>';
  cmApiTimeout=setTimeout(()=>fetchOpenFoodFacts(query),250);
}

async function fetchOpenFoodFacts(query){
  const results=document.getElementById('cm-ing-results');
  const key=query.trim().toLowerCase();
  try{
    const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=10&lc=fi&cc=fi&fields=product_name,brands,nutriments`;
    const resp=await fetch(url);
    if(!resp.ok) throw new Error('API error');
    const data=await resp.json();
    const products=(data.products||[]).filter(p=>{
      const n=p.nutriments;
      return p.product_name&&n&&(n['energy-kcal_100g']!==undefined||n['energy-kcal']!==undefined);
    }).slice(0,8).map(normalizeOFFProduct);
    cmSearchCache.set(key,products);
    renderNormalizedProducts(products);
  }catch(err){
    console.error('Open Food Facts error:',err);
    results.innerHTML='<div style="padding:12px;color:var(--red);font-size:13px;">Haku epäonnistui — tarkista verkkoyhteytesi</div>';
  }
}

    ...customIngredients.map(i=>({a:i.amount+'g',n:i.name})),
    ...customFreeIngredients.filter(i=>i.n.trim()).map(i=>({a:i.a,n:i.n})),
  ];

  const meal={
    name,kcal:m.kcal,protein:m.protein,carbs:m.carbs,fat:m.fat,
    emoji:customEmoji,time,mealPrep:false,
    ingredients:allIngredients,

  const mi=customMealTarget;

function renderWeightTab(){
  const log=state.weightLog;
  const last14=log.slice(-14);

  let statsHtml='';
  if(log.length>=2){
    const latest=log[log.length-1].weight;
    const prev=log[log.length-2].weight;
    const diff=latest-prev;
    const dirClass=diff>0.1?'up':diff<-0.1?'down':'neutral';
    const dirStr=diff>0?`+${diff.toFixed(1)}`:diff.toFixed(1);
    const weekLog=log.slice(-7);
    const weekDiff=weekLog.length>=2?(weekLog[weekLog.length-1].weight-weekLog[0].weight):0;
    const wdirClass=weekDiff>0.1?'up':weekDiff<-0.1?'down':'neutral';

    statsHtml=`<div class="weight-stats">
      <div class="ws-card"><div class="ws-label">Viimeisin</div><div class="ws-val ${dirClass}">${latest} kg</div><div class="ws-sub">Muutos: ${dirStr} kg</div></div>
      <div class="ws-card"><div class="ws-label">7 päivän muutos</div><div class="ws-val ${wdirClass}">${Math.abs(weekDiff).toFixed(1)} kg</div><div class="ws-sub">${weekDiff<0?'laskua ↓':weekDiff>0?'nousua ↑':'ei muutosta'}</div></div>
    </div>`;
  }

  const chartHtml=last14.length>=2?`
    <div class="weight-chart-wrap"><div class="wc-title">14 päivän kehitys</div>
      <svg class="weight-chart" viewBox="0 0 340 100" preserveAspectRatio="none">${renderWeightChart(last14)}</svg>
    </div>`:'';

  const entriesHtml=log.length?`
    <div class="weight-entries">
      ${log.slice().reverse().slice(0,10).map((entry,i,arr)=>{
        const prevEntry=arr[i+1];
        const diff=prevEntry?entry.weight-prevEntry.weight:null;
        const dirClass=diff!==null?(diff>0.05?'up':diff<-0.05?'down':''):'';
        const diffStr=diff!==null?(diff>0?`+${diff.toFixed(1)}`:diff.toFixed(1)):'';
        return `<div class="we-row"><div class="we-date">${formatDate(entry.date)}</div><div style="display:flex;align-items:center;gap:10px;">${diffStr?`<div class="we-diff ${dirClass}">${diffStr}</div>`:''}<div class="we-val">${entry.weight} kg</div></div></div>`;
      }).join('')}
    </div>`:'';

  const aiComment=log.length>=3?`
    <div class="ai-comment"><div class="ai-comment-label">✨ AI Analyysi</div><div class="ai-comment-text">${generateWeightComment()}</div></div>`:'';

  document.getElementById('weight-content').innerHTML=`
    <div class="weight-log-form">
      <div class="wlf-field"><label class="wlf-label">Paino (kg)</label><input class="wlf-input" id="weight-input" type="number" step="0.1" placeholder="75.0"></div>
      <button class="wlf-btn" onclick="logWeight()">Kirjaa</button>
    </div>
    ${chartHtml}${statsHtml}${entriesHtml}${aiComment}
    ${log.length===0?'<div class="empty-state"><div class="es-icon">⚖️</div><p>Kirjaa ensimmäinen painosi yllä.<br>Seuraat kehitystäsi 14 päivän kaaviossa.</p></div>':''}`;
}

function renderWeightChart(log){
  if(log.length<2)return '';
  const weights=log.map(e=>e.weight);
  const min=Math.min(...weights)-0.5;const max=Math.max(...weights)+0.5;
  const range=max-min||1;const n=log.length;
  const pts=log.map((e,i)=>{const x=(i/(n-1))*300+20;const y=90-((e.weight-min)/range)*80;return `${x},${y}`;});
  const pathD=`M ${pts.join(' L ')}`;
  const areaD=`M ${pts[0]} L ${pts.join(' L ')} L ${300+20},90 L 20,90 Z`;
  return `<defs><linearGradient id="wgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8b84b" stop-opacity="0.3"/><stop offset="100%" stop-color="#e8b84b" stop-opacity="0"/></linearGradient></defs>
    <path d="${areaD}" fill="url(#wgrad)"/><path d="${pathD}" fill="none" stroke="#e8b84b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${log.map((e,i)=>{const x=(i/(n-1))*300+20;const y=90-((e.weight-min)/range)*80;return `<circle cx="${x}" cy="${y}" r="3" fill="#e8b84b"/>`;}).join('')}`;
}

function generateWeightComment(){
  const log=state.weightLog;const goal=state.profile?.goal;
  const latest=log[log.length-1].weight;const first=log[0].weight;
  const diff=latest-first;const days=log.length;
  if(goal==='cut'){
    if(diff<-0.5)return `Hyvää työtä! Olet pudottanut ${Math.abs(diff).toFixed(1)} kg ${days} päivässä. Pidä kalorivaje tasaisena ja unihuolto kunnossa.`;
    if(diff>0.5)return `Paino on noussut ${diff.toFixed(1)} kg. Tarkista päivittäiset kalorit — pienin muutoksin pysyt tavoitteessa.`;
    return `Paino pysyy tasaisena. Rasvanpudotus on hidasta alussa — jatka johdonmukaisesti!`;
  } else if(goal==='bulk'){
    if(diff>0.3)return `Hyvä suunta! Paino on noussut ${diff.toFixed(1)} kg. Varmista riittävä proteiininsaanti lihasmassan tueksi.`;
    if(diff<-0.3)return `Paino on laskenut — lisää kaloreita tai tarkista palautuminen ja lepo.`;
    return `Paino on vakaa. Bulking vaatii kärsivällisyyttä — asteittainen nousu on terveellisintä.`;
  }
  return `Paino pysyy hyvin hallinnassa. Jatka samaan tapaan — johdonmukaisuus on avain tuloksiin!`;
}

async function logWeight(){
  const input=document.getElementById('weight-input');
  const val=parseFloat(input.value);
  if(!val||val<20||val>300){showToast('Syötä kelvollinen paino (20–300 kg)','error');return;}
  const today=new Date().toISOString().split('T')[0];
  const existing=state.weightLog.findIndex(e=>e.date===today);
  if(existing>=0) state.weightLog[existing].weight=val;
  else state.weightLog.push({date:today,weight:val});
  state.weightLog.sort((a,b)=>a.date.localeCompare(b.date));
  await save('weightLog',state.weightLog);
  input.value='';renderWeightTab();
}

function formatDate(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('fi-FI',{weekday:'short',day:'numeric',month:'short'});
}

async function settingsRecalcMacros(){
  const kcal=parseInt(document.getElementById('ss-kcal')?.value)||0;
  const protein=parseInt(document.getElementById('ss-protein')?.value)||0;
  const fat=parseInt(document.getElementById('ss-fat')?.value)||0;
  if(kcal<=0)return;
  const derived=deriveMacros(kcal,protein,fat);
  state.profile.macros={kcal,protein,carbs:derived.carbs,fat};
  const display=document.getElementById('ss-carbs-display');
  if(display) display.innerHTML=`${derived.carbs}g <span style="font-size:11px;color:var(--text3);">(auto)</span>`;
  await save('profile',state.profile);
  renderMacroStrip();
}

async function saveProfileSettings(){
  const name=document.getElementById('sp-name')?.value.trim();
  const age=parseInt(document.getElementById('sp-age')?.value);
  const weight=parseFloat(document.getElementById('sp-weight')?.value);
  const height=parseFloat(document.getElementById('sp-height')?.value);
  const goal=document.getElementById('sp-goal')?.value;
  if(!name){showToast('Syötä nimi','error');return;}
  if(!age||age<10||age>100){showToast('Tarkista ikä','error');return;}
  if(!weight||weight<30||weight>250){showToast('Tarkista paino','error');return;}
  if(!height||height<100||height>250){showToast('Tarkista pituus','error');return;}
  state.profile={...state.profile,name,age,weight,height,goal};
  state.profile.macros=calcMacros(state.profile);
  await save('profile',state.profile);
  renderMacroStrip();
  renderSettingsTab();
  showToast('Profiili tallennettu!','success');
}

async function resetApp(){
  const keys=['profile','mealPlan','selectedOptions','weightLog','diary','viewDate'];
  try{
    if(_hasClaudeStorage){for(const k of keys) await window.storage.delete(k);}
    else{for(const k of keys) localStorage.removeItem('ravinto_'+k);}
  }catch(e){}
  location.reload();
}

function todayISO(){ return new Date().toISOString().split('T')[0]; }

function shiftDate(dateStr,days){
  const d=new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}

function getWeekDays(centerDate){
  const d=new Date(centerDate+'T12:00:00');
  const dow=d.getDay(); // 0=Sun
  const mon=new Date(d);
  mon.setDate(d.getDate()-(dow===0?6:dow-1)); // Monday
  const days=[];
  for(let i=0;i<7;i++){
    const dd=new Date(mon);
    dd.setDate(mon.getDate()+i);
    days.push(dd.toISOString().split('T')[0]);
  }
  return days;
}

const DIARY_SLOTS=[
  {key:'aamiainen',  label:'Aamiainen',     icon:'☀️'},
  {key:'lounas',     label:'Lounas',         icon:'🌤️'},
  {key:'paivallinen',label:'Päivällinen',    icon:'🌅'},
  {key:'valipala',   label:'Välipalat/Muut', icon:'🌙'},
];
const SLOT_MAP={'Aamiainen':'aamiainen','Lounas':'lounas','Päivällinen':'paivallinen','Välipala':'valipala','Iltapala':'valipala'};

function ensureDiaryDay(dateStr){
  if(!state.diary[dateStr]) state.diary[dateStr]={eaten:{},freeEntries:[],slots:{aamiainen:[],lounas:[],paivallinen:[],valipala:[]}};
  if(!state.diary[dateStr].slots) state.diary[dateStr].slots={aamiainen:[],lounas:[],paivallinen:[],valipala:[]};
  DIARY_SLOTS.forEach(s=>{if(!state.diary[dateStr].slots[s.key]) state.diary[dateStr].slots[s.key]=[];});
  return state.diary[dateStr];
}

function calcDiaryEaten(dateStr){
  const day=state.diary[dateStr];
  const eaten={kcal:0,protein:0,carbs:0,fat:0};
  if(!day) return eaten;
  // New slots
  if(day.slots) Object.values(day.slots).forEach(items=>items.forEach(it=>{eaten.kcal+=it.kcal||0;eaten.protein+=it.protein||0;eaten.carbs+=it.carbs||0;eaten.fat+=it.fat||0;}));
  // Legacy eaten
  const trainingMode=state.profile?.trainingMode||'boost';
  if(day.eaten) Object.keys(day.eaten).forEach(miStr=>{
    if(!day.eaten[miStr]) return;
    const mi=parseInt(miStr);
    const meal=state.mealPlan[mi]; if(!meal) return;
    if(meal.isTrainingSnack&&(!state.trainingDay||trainingMode==='boost')) return;
    const opt=meal.options[state.selectedOptions[mi]||0];
    if(opt){eaten.kcal+=Math.round(opt.kcal||0);eaten.protein+=Math.round(opt.protein||0);eaten.carbs+=Math.round(opt.carbs||0);eaten.fat+=Math.round(opt.fat||0);}
  });
  // Legacy free entries
  if(day.freeEntries) day.freeEntries.forEach(fe=>{eaten.kcal+=fe.kcal||0;eaten.protein+=fe.protein||0;eaten.carbs+=fe.carbs||0;eaten.fat+=fe.fat||0;});
  return {kcal:Math.round(eaten.kcal),protein:Math.round(eaten.protein),carbs:Math.round(eaten.carbs),fat:Math.round(eaten.fat)};
}

    const matches=state.mealPlan.filter(m=>SLOT_MAP[m.slot]===diaryAddTarget);
    const mealsToShow=matches.length?matches:state.mealPlan;
    if(!mealsToShow.length){
      bodyHtml='<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px;">Ei aterioita tässä kategoriassa</div>';
    } else {
      bodyHtml=mealsToShow.map(meal=>{
        const realIdx=state.mealPlan.indexOf(meal);
        const opt=meal.options[state.selectedOptions[realIdx]||0];
        if(!opt) return '';
        return `<div class="dam-plan-item" onclick="addDiaryFromPlan(${realIdx})">
          <div class="dam-plan-item-name">${sanitize(opt.emoji||'')} ${sanitize(opt.name)}<span style="font-size:11px;color:var(--text3);margin-left:6px;">${sanitize(meal.slot)}</span></div>
          <div class="dam-plan-item-macros">${Math.round(opt.kcal||0)} kcal · P ${Math.round(opt.protein||0)}g · HH ${Math.round(opt.carbs||0)}g · R ${Math.round(opt.fat||0)}g</div>
        </div>`;
      }).join('');
    }
