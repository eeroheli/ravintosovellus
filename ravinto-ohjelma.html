function renderWeightTab(){
  const log=state.weightLog;
  const last14=log.slice(-30);

  let statsHtml='';
  if(log.length>=2){
    const latest=log[log.length-1].weight;
    const prev=log[log.length-2].weight;
    const diff=latest-prev;
    const dirClass=diff>0.1?'up':diff<-0.1?'down':'neutral';
    const dirStr=diff>0?`+${diff.toFixed(1)}`:diff.toFixed(1);
    const weekLog=log.slice(-7);
    const weekDiff=weekLog.length>=2?(weekLog[weekLog.length-1].weight-weekLog[0].weight):0;
    const wdirClass=weekDiff>0.1?'up':weekDiff<-0.1?'down':'neutral';

    statsHtml=`<div class="weight-stats">
      <div class="ws-card"><div class="ws-label">Viimeisin</div><div class="ws-val ${dirClass}">${latest} kg</div><div class="ws-sub">Muutos: ${dirStr} kg</div></div>
      <div class="ws-card"><div class="ws-label">7 päivän muutos</div><div class="ws-val ${wdirClass}">${Math.abs(weekDiff).toFixed(1)} kg</div><div class="ws-sub">${weekDiff<0?'laskua ↓':weekDiff>0?'nousua ↑':'ei muutosta'}</div></div>
    </div>`;
  }

  const chartHtml=last14.length>=2?`
    <div class="weight-chart-wrap"><div class="wc-title">${last14.length} päivän kehitys</div>
      <svg class="weight-chart" viewBox="0 0 340 120" preserveAspectRatio="none">${renderWeightChart(last14)}</svg>
    </div>`:'';

  const entriesHtml=log.length?`
    <div class="weight-entries">
      ${log.slice().reverse().slice(0,10).map((entry,i,arr)=>{
        const prevEntry=arr[i+1];
        const diff=prevEntry?entry.weight-prevEntry.weight:null;
        const dirClass=diff!==null?(diff>0.05?'up':diff<-0.05?'down':''):'';
        const diffStr=diff!==null?(diff>0?`+${diff.toFixed(1)}`:diff.toFixed(1)):'';
        return `<div class="we-row"><div class="we-date">${formatDate(entry.date)}</div><div style="display:flex;align-items:center;gap:10px;">${diffStr?`<div class="we-diff ${dirClass}">${diffStr}</div>`:''}<div class="we-val">${entry.weight} kg</div></div></div>`;
      }).join('')}
    </div>`:'';

  const aiComment=log.length>=3?`
    <div class="ai-comment"><div class="ai-comment-label">✨ AI Analyysi</div><div class="ai-comment-text">${generateWeightComment()}</div></div>`:'';

  // Tavoiteaikajana
  let timelineHtml='';
  const targetW=state.profile?.targetWeight;
  if(targetW&&log.length>=3){
    const latest=log[log.length-1].weight;
    const diff=targetW-latest;
    const n=log.length;
    // Lineaarinen trendi (kg/viikko): käytä ensimmäistä ja viimeistä, skaalaa päivistä viikoiksi
    const daySpan=Math.max(1,(new Date(log[n-1].date)-new Date(log[0].date))/(1000*60*60*24));
    const totalChange=log[n-1].weight-log[0].weight;
    const ratePerWeek=totalChange/daySpan*7;
    const absRate=Math.abs(ratePerWeek);
    const isOnTrack=(diff<0&&ratePerWeek<-0.05)||(diff>0&&ratePerWeek>0.05);
    if(Math.abs(diff)<0.2){
      timelineHtml=`<div class="wt-timeline"><div class="wt-timeline-title">Tavoiteaikajana</div><div class="wt-timeline-info" style="color:var(--green)">🎯 Olet tavoitepainossa!</div><div class="wt-timeline-sub">Tavoitepaino: ${targetW} kg</div></div>`;
    } else if(absRate<0.05){
      timelineHtml=`<div class="wt-timeline"><div class="wt-timeline-title">Tavoiteaikajana</div><div class="wt-timeline-info">Tavoite: ${targetW} kg (${diff>0?'+':''}${diff.toFixed(1)} kg jäljellä)</div><div class="wt-timeline-sub">Paino ei ole muuttunut viime aikoina — tarkista kalorit.</div></div>`;
    } else {
      const weeksToGoal=Math.abs(diff)/absRate;
      const eta=new Date();eta.setDate(eta.getDate()+Math.round(weeksToGoal*7));
      const etaStr=eta.toLocaleDateString('fi-FI',{day:'numeric',month:'long'});
      const pct=Math.min(100,Math.max(0,Math.round((1-(Math.abs(diff)/Math.abs(targetW-(log[0].weight))))*100)));
      timelineHtml=`<div class="wt-timeline">
        <div class="wt-timeline-title">Tavoiteaikajana</div>
        <div class="wt-timeline-info">${isOnTrack?'🎯':'📊'} Tavoite ${targetW} kg — arviolta ${Math.round(weeksToGoal)} vkoa</div>
        <div class="wt-timeline-sub">Tahti ${ratePerWeek>0?'+':''}${ratePerWeek.toFixed(2)} kg/vko · ETA ${etaStr}</div>
        <div class="wt-timeline-bar"><div class="wt-timeline-fill" style="width:${pct}%"></div></div>
      </div>`;
    }
  }

  const lastWeight=log.length?log[log.length-1].weight:(state.profile?.weight||75);

  document.getElementById('weight-content').innerHTML=`
    <div class="weight-log-form">
      <div class="wlf-field">
        <label class="wlf-label">Paino (kg)</label>
        <div class="wlf-step-wrap">
          <button class="wlf-step-btn" type="button" onclick="stepInput('weight-input',-1,event)">−</button>
          <input id="weight-input" type="number" step="0.1" min="20" max="300" value="${lastWeight}" placeholder="75.0">
          <button class="wlf-step-btn" type="button" onclick="stepInput('weight-input',1,event)">＋</button>
        </div>
      </div>
      <button class="wlf-btn" onclick="logWeight()">Kirjaa</button>
    </div>
    ${timelineHtml}${chartHtml}${statsHtml}${entriesHtml}${aiComment}
    ${log.length===0?'<div class="empty-state"><div class="es-icon">⚖️</div><p>Kirjaa ensimmäinen painosi yllä.<br>Seuraat kehitystäsi 14 päivän kaaviossa.</p></div>':''}`;
}

function renderWeightChart(log){
  if(log.length<2)return '';
  const weights=log.map(e=>e.weight);
  const minW=Math.min(...weights);const maxW=Math.max(...weights);
  const pad=Math.max(0.5,(maxW-minW)*0.15)||0.5;
  const minY=minW-pad;const maxY=maxW+pad;
  const range=maxY-minY||1;const n=log.length;
  // chart area: x 30..330, y 8..90 (labels at bottom 90..112)
  const cx=i=>(i/(n-1))*300+30;
  const cy=w=>88-((w-minY)/range)*80;
  const pts=log.map((e,i)=>`${cx(i)},${cy(e.weight)}`);
  const pathD=`M ${pts.join(' L ')}`;
  const areaD=`M ${pts[0]} L ${pts.join(' L ')} L ${cx(n-1)},88 L ${cx(0)},88 Z`;
  // Y-axis labels (min, max)
  const yLabels=`
    <text class="wc-axis-label" x="28" y="${cy(maxW)+4}" text-anchor="end">${maxW.toFixed(1)}</text>
    <text class="wc-axis-label" x="28" y="${cy(minW)+4}" text-anchor="end">${minW.toFixed(1)}</text>`;
  // X-axis labels: first and last date
  const fmt=d=>{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('fi-FI',{day:'numeric',month:'numeric'});};
  const xLabels=`
    <text class="wc-axis-label" x="${cx(0)}" y="104" text-anchor="middle">${fmt(log[0].date)}</text>
    <text class="wc-axis-label" x="${cx(n-1)}" y="104" text-anchor="middle">${fmt(log[n-1].date)}</text>`;
  // Middle date if enough points
  const midLabel=n>4?`<text class="wc-axis-label" x="${cx(Math.floor(n/2))}" y="104" text-anchor="middle">${fmt(log[Math.floor(n/2)].date)}</text>`:'';
  return `<defs><linearGradient id="wgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8b84b" stop-opacity="0.3"/><stop offset="100%" stop-color="#e8b84b" stop-opacity="0"/></linearGradient></defs>
    <line x1="30" y1="8" x2="30" y2="88" stroke="#2e2e2e" stroke-width="1"/>
    <line x1="30" y1="88" x2="330" y2="88" stroke="#2e2e2e" stroke-width="1"/>
    <path d="${areaD}" fill="url(#wgrad)"/>
    <path d="${pathD}" fill="none" stroke="#e8b84b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${log.map((e,i)=>`<circle cx="${cx(i)}" cy="${cy(e.weight)}" r="3" fill="#e8b84b"/>`).join('')}
    ${yLabels}${xLabels}${midLabel}`;
}

function generateWeightComment(){
  const log=state.weightLog;const goal=state.profile?.goal;
  const latest=log[log.length-1].weight;const first=log[0].weight;
  const diff=latest-first;const days=log.length;
  if(goal==='cut'){
    if(diff<-0.5)return `Hyvää työtä! Olet pudottanut ${Math.abs(diff).toFixed(1)} kg ${days} päivässä. Pidä kalorivaje tasaisena ja unihuolto kunnossa.`;
    if(diff>0.5)return `Paino on noussut ${diff.toFixed(1)} kg. Tarkista päivittäiset kalorit — pienin muutoksin pysyt tavoitteessa.`;
    return `Paino pysyy tasaisena. Rasvanpudotus on hidasta alussa — jatka johdonmukaisesti!`;
  } else if(goal==='bulk'){
    if(diff>0.3)return `Hyvä suunta! Paino on noussut ${diff.toFixed(1)} kg. Varmista riittävä proteiininsaanti lihasmassan tueksi.`;
    if(diff<-0.3)return `Paino on laskenut — lisää kaloreita tai tarkista palautuminen ja lepo.`;
    return `Paino on vakaa. Bulking vaatii kärsivällisyyttä — asteittainen nousu on terveellisintä.`;
  }
  return `Paino pysyy hyvin hallinnassa. Jatka samaan tapaan — johdonmukaisuus on avain tuloksiin!`;
}

async function logWeight(){
  const input=document.getElementById('weight-input');
  const val=parseFloat(input.value);
  if(!val||val<20||val>300){showToast('Syötä kelvollinen paino (20–300 kg)','error');return;}
  const today=new Date().toISOString().split('T')[0];
  const existing=state.weightLog.findIndex(e=>e.date===today);
  if(existing>=0) state.weightLog[existing].weight=val;
  else state.weightLog.push({date:today,weight:val});
  state.weightLog.sort((a,b)=>a.date.localeCompare(b.date));
  await save('weightLog',state.weightLog);
  // Päivitä paino myös profiiliin
  if(state.profile){
    state.profile.weight=val;
    await save('profile',state.profile);
    renderSettingsTab();
  }
  renderWeightTab();
  showToast(`${val} kg kirjattu!`,'success');
}

function formatDate(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('fi-FI',{weekday:'short',day:'numeric',month:'short'});
}

function toggleSettingsMealSlot(id){
  if(!state.profile) return;
  const meals=state.profile.selectedMeals||[];
  const idx=meals.indexOf(id);
  if(idx>=0){
    if(meals.length<=2){showToast('Vähintään 2 ateriaa vaaditaan','error');return;}
    meals.splice(idx,1);
  } else {
    // Lisää oikeaan järjestykseen AVAILABLE_MEALS-järjestyksen mukaan
    const order=AVAILABLE_MEALS.map(m=>m.id);
    meals.push(id);
    meals.sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  }
  state.profile.selectedMeals=meals;
  state.profile.mealCount=meals.length;
  renderSettingsTab();
}

function toggleSettingsRestriction(r){
  if(!state.profile) return;
  if(!state.profile.restrictions) state.profile.restrictions=[];
  const idx=state.profile.restrictions.indexOf(r);
  if(idx>=0) state.profile.restrictions.splice(idx,1);
  else state.profile.restrictions.push(r);
  renderSettingsTab();
}

// UTILITY FUNCTIONS
// ═══════════════════════════════════════════
function todayISO(){ return new Date().toISOString().split('T')[0]; }

function shiftDate(dateStr,days){
  const d=new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}

function getWeekDays(centerDate){
  const d=new Date(centerDate+'T12:00:00');
  const dow=d.getDay(); // 0=Sun
  const mon=new Date(d);
  mon.setDate(d.getDate()-(dow===0?6:dow-1)); // Monday
  const days=[];
  for(let i=0;i<7;i++){
    const dd=new Date(mon);
    dd.setDate(mon.getDate()+i);
    days.push(dd.toISOString().split('T')[0]);
  }
  return days;
}

// DIARY TAB v2
// ═══════════════════════════════════════════
const DIARY_SLOTS=[
  {key:'aamiainen',  label:'Aamiainen',     icon:'☀️'},
  {key:'lounas',     label:'Lounas',         icon:'🌤️'},
  {key:'paivallinen',label:'Päivällinen',    icon:'🌅'},
  {key:'valipala',   label:'Välipalat/Muut', icon:'🌙'},
];
const SLOT_MAP={'Aamiainen':'aamiainen','Lounas':'lounas','Päivällinen':'paivallinen','Välipala':'valipala','Iltapala':'valipala'};

function ensureDiaryDay(dateStr){
  if(!state.diary[dateStr]) state.diary[dateStr]={eaten:{},freeEntries:[],slots:{aamiainen:[],lounas:[],paivallinen:[],valipala:[]}};
  if(!state.diary[dateStr].slots) state.diary[dateStr].slots={aamiainen:[],lounas:[],paivallinen:[],valipala:[]};
  DIARY_SLOTS.forEach(s=>{if(!state.diary[dateStr].slots[s.key]) state.diary[dateStr].slots[s.key]=[];});
  return state.diary[dateStr];
}

function calcDiaryEaten(dateStr){
  const day=state.diary[dateStr];
  const eaten={kcal:0,protein:0,carbs:0,fat:0};
  if(!day) return eaten;
  // New slots
  if(day.slots) Object.values(day.slots).forEach(items=>items.forEach(it=>{eaten.kcal+=it.kcal||0;eaten.protein+=it.protein||0;eaten.carbs+=it.carbs||0;eaten.fat+=it.fat||0;}));
  // Legacy eaten
  const trainingMode=state.profile?.trainingMode||'boost';
  if(day.eaten) Object.keys(day.eaten).forEach(miStr=>{
    if(!day.eaten[miStr]) return;
    const mi=parseInt(miStr);
    const meal=state.mealPlan[mi]; if(!meal) return;
    if(meal.isTrainingSnack&&(!state.trainingDay||trainingMode==='boost')) return;
    const opt=meal.options[state.selectedOptions[mi]||0];
    if(opt){eaten.kcal+=Math.round(opt.kcal||0);eaten.protein+=Math.round(opt.protein||0);eaten.carbs+=Math.round(opt.carbs||0);eaten.fat+=Math.round(opt.fat||0);}
  });
  // Legacy free entries
  if(day.freeEntries) day.freeEntries.forEach(fe=>{eaten.kcal+=fe.kcal||0;eaten.protein+=fe.protein||0;eaten.carbs+=fe.carbs||0;eaten.fat+=fe.fat||0;});
  return {kcal:Math.round(eaten.kcal),protein:Math.round(eaten.protein),carbs:Math.round(eaten.carbs),fat:Math.round(eaten.fat)};
}

function diarySearch(query){
  const results=document.getElementById('diary-search-results');
  clearTimeout(diarySearchTimeout);
  if(!query||query.length<2){
    results.innerHTML='<div style="padding:12px 0;text-align:center;color:var(--text3);font-size:13px;">Kirjoita vähintään 2 merkkiä...</div>';
    return;
  }
  // Näytä heti paikalliset tulokset + spinne
  const localDb=searchQuickDB(query);
  const localFi=searchLocalFiProducts(query);
  renderDiarySearchResults(localDb,localFi,query,true);
  // Hae aina live API (deduplointi renderissä)
  diarySearchTimeout=setTimeout(async()=>{
    const live=await searchOFFLive(query);
    renderDiarySearchResults(localDb,live,query,false);
  },500);
}

function renderDiarySearchResults(localDb,apiProducts,query,loading){
  const results=document.getElementById('diary-search-results');
  if(!results) return;
  // Deduploi API-tulokset paikallisten nimien perusteella
  const localNames=new Set(localDb.map(a=>a.name.toLowerCase()));
  const deduped=apiProducts.filter(p=>!localNames.has(p.name.toLowerCase()));
  const dbRows=localDb.map(a=>`
    <div class="dam-search-result" onclick="addDiaryFromDB(${a.idx})">
      <div><div class="dam-sr-name">${sanitize(a.name)}</div><div class="dam-sr-cat">per 100g</div></div>
      <div class="dam-sr-macros">${a.kcal} kcal<br>${a.protein}g P</div>
    </div>`).join('');
  window._diaryApiProducts=deduped;
  const apiRows=deduped.map((p,i)=>`
    <div class="dam-search-result" onclick="addDiaryFromApiProduct(${i})">
      <div><div class="dam-sr-name">${sanitize(p.name)}</div><div class="dam-sr-cat">${sanitize(p.brand||'Kaupan tuote')} · per 100g</div></div>
      <div class="dam-sr-macros">${p.kcal} kcal<br>${p.protein}g P</div>
    </div>`).join('');
  const spinner=loading?'<div style="padding:8px 0;text-align:center;color:var(--text3);font-size:12px;">🔍 Haetaan verkosta...</div>':'';
  if(!dbRows.length&&!apiRows.length){
    results.innerHTML=loading
      ?'<div style="padding:12px 0;text-align:center;color:var(--text3);font-size:13px;">🔍 Haetaan...</div>'
      :'<div style="padding:12px 0;text-align:center;color:var(--text3);font-size:13px;">Ei tuloksia — kokeile eri hakusanaa</div>';
    return;
  }
  results.innerHTML=dbRows+apiRows+spinner;
}

async function addDiaryFromApiProduct(idx){
  const p=(window._diaryApiProducts||[])[idx]; if(!p) return;
  const dateStr=state.currentDate||todayISO();
  const day=ensureDiaryDay(dateStr);
  day.slots[diaryAddTarget].push({name:p.name+(p.brand?` (${p.brand})`:'')+' 100g',emoji:'🛒',kcal:p.kcal,protein:p.protein,carbs:p.carbs,fat:p.fat});
  await save('diary',state.diary);
  closeDiaryAddModal();
  renderDiaryTab();
  if(dateStr===todayISO()) renderMacroStrip();
  showToast('Lisätty!','success');
}

async function copyPrevDay(){
  const dateStr=state.currentDate||todayISO();
  const prevDate=shiftDate(dateStr,-1);
  const prev=state.diary[prevDate]; if(!prev) return;
  const cur=state.diary[dateStr];
  const curHasData=cur&&DIARY_SLOTS.some(s=>(cur.slots?.[s.key]||[]).length>0);
  const doCopy=async()=>{
    const day=ensureDiaryDay(dateStr);
    DIARY_SLOTS.forEach(s=>{
      const src=(prev.slots?.[s.key]||[]);
      day.slots[s.key]=[...day.slots[s.key],...src.map(it=>({...it}))];
    });
    await save('diary',state.diary);
    renderDiaryTab();
    if(dateStr===todayISO()) renderMacroStrip();
    showToast('Edellinen päivä kopioitu!','success');
  };
  if(curHasData){
    showConfirm('Päivässä on jo merkintöjä. Lisätäänkö eilisen ateriat niiden perään?',doCopy);
  } else {
    doCopy();
  }
}

let calViewMonth=null;

function openCalModal(){
  const dateStr=state.currentDate||todayISO();
  calViewMonth=dateStr.substring(0,7);
  renderCalModal();
  document.getElementById('cal-modal').style.display='flex';
}
function closeCalModal(e){
  if(!e||e.target===document.getElementById('cal-modal'))
    document.getElementById('cal-modal').style.display='none';
}
function navCalMonth(dir){
  const [y,m]=calViewMonth.split('-').map(Number);
  const d=new Date(y,m-1+dir,1);
  calViewMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  renderCalModal();
}
function selectCalDay(dateStr){
  state.currentDate=dateStr;
  closeCalModal();
  renderDiaryTab();
}

function renderCalModal(){
  const [y,m]=calViewMonth.split('-').map(Number);
  const today=todayISO();
  const selectedDate=state.currentDate||today;
  const targetKcal=state.profile?.macros?.kcal||2000;
  const monthNames=['Tammikuu','Helmikuu','Maaliskuu','Huhtikuu','Toukokuu','Kesäkuu','Heinäkuu','Elokuu','Syyskuu','Lokakuu','Marraskuu','Joulukuu'];
  const firstDow=new Date(y,m-1,1).getDay();
  const offset=firstDow===0?6:firstDow-1;
  const daysInMonth=new Date(y,m,0).getDate();

  let cells='';
  for(let i=0;i<offset;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const eaten=calcDiaryEaten(dateStr);
    const hasData=eaten.kcal>0;
    let dotClass='none';
    if(hasData){const pct=eaten.kcal/targetKcal;dotClass=pct>=0.85&&pct<=1.15?'green':pct>1.15?'red':'yellow';}
    const isToday=dateStr===today;
    const isSel=dateStr===selectedDate;
    cells+=`<div class="cal-cell ${isToday?'today-cell':''} ${isSel?'selected-cell':''}" onclick="selectCalDay('${dateStr}')">
      <span class="cal-cell-num">${d}</span>
      <div class="cal-cell-dot ${dotClass}"></div>
    </div>`;
  }

  // Week averages for selected week
  const weekDays=getWeekDays(selectedDate);
  let wK=0,wP=0,wC=0,wF=0,wN=0;
  weekDays.forEach(wd=>{const e=calcDiaryEaten(wd);if(e.kcal>0){wN++;wK+=e.kcal;wP+=e.protein;wC+=e.carbs;wF+=e.fat;}});
  const wn=Math.max(1,wN);
  const weekAvgHtml=`<div class="cal-week-avg">
    <div class="cal-week-avg-title">Viikon keskiarvo (${wN} pv kirjattu)</div>
    <div class="cal-avg-row">
      <div class="cal-avg-item"><div class="cal-avg-val">${Math.round(wK/wn)}</div><div class="cal-avg-label">kcal</div></div>
      <div class="cal-avg-item"><div class="cal-avg-val" style="color:var(--blue)">${Math.round(wP/wn)}g</div><div class="cal-avg-label">Proteiini</div></div>
      <div class="cal-avg-item"><div class="cal-avg-val" style="color:var(--accent)">${Math.round(wC/wn)}g</div><div class="cal-avg-label">HH</div></div>
      <div class="cal-avg-item"><div class="cal-avg-val" style="color:var(--green)">${Math.round(wF/wn)}g</div><div class="cal-avg-label">Rasva</div></div>
    </div>
  </div>`;

  document.getElementById('cal-modal-content').innerHTML=`
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="navCalMonth(-1)">‹</button>
      <div class="cal-month-label">${monthNames[m-1]} ${y}</div>
      <button class="cal-nav-btn" onclick="navCalMonth(1)">›</button>
    </div>
    <div class="cal-weekdays">${['Ma','Ti','Ke','To','Pe','La','Su'].map(d=>`<div class="cal-wd">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    ${weekAvgHtml}
    <div style="margin-bottom:10px;display:flex;gap:12px;font-size:11px;color:var(--text3);">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:4px;"></span>Tavoitteessa</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:4px;"></span>Alle tavoitteen</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-right:4px;"></span>Yli tavoitteen</span>
    </div>
    <button class="cal-close-btn" onclick="closeCalModal()">Sulje</button>`;
}

function renderDiaryTab(){
  const container=document.getElementById('diary-content');
  if(!container) return;
  const p=state.profile; if(!p) return;
  const dateStr=state.currentDate||todayISO();
  const today=todayISO();
  const weekDays=getWeekDays(dateStr);
  const m=p.macros;
  const boost=(state.trainingDay&&(p.trainingMode||'boost')==='boost')?1.07:1.0;
  const tKcal=Math.round(m.kcal*boost);
  const tProt=Math.round(m.protein*boost);
  const tCarbs=Math.round(m.carbs*boost);
  const tFat=Math.round(m.fat*boost);
  const eaten=calcDiaryEaten(dateStr);

  // Date label
  const dayNamesLong=['sunnuntai','maanantai','tiistai','keskiviikko','torstai','perjantai','lauantai'];
  const monthNamesShort=['tammik.','helmik.','maalisk.','huhtik.','toukok.','kesäk.','heinäk.','elok.','syysk.','lokak.','marrask.','jouluk.'];
  const dateObj=new Date(dateStr+'T12:00:00');
  const dateLabel=dateStr===today?'Tänään':dateStr===shiftDate(today,-1)?'Eilen':`${dayNamesLong[dateObj.getDay()]}, ${dateObj.getDate()}. ${monthNamesShort[dateObj.getMonth()]}`;

  // Week strip
  const weekStripHtml=`<div class="diary-week-strip">${weekDays.map(wd=>{
    const d=new Date(wd+'T12:00:00');
    const wdNames=['Su','Ma','Ti','Ke','To','Pe','La'];
    const isActive=wd===dateStr;
    const e=calcDiaryEaten(wd);
    const hasDot=e.kcal>0;
    return `<button class="diary-day-btn ${isActive?'active':''} ${wd===today&&!isActive?'today':''}" onclick="setDiaryDate('${wd}')">
      <span class="dd-weekday">${wdNames[d.getDay()]}</span>
      <span class="dd-date">${d.getDate()}</span>
      <div style="width:5px;height:5px;border-radius:50%;margin-top:2px;background:${hasDot&&!isActive?'var(--green)':'transparent'};"></div>
    </button>`;
  }).join('')}</div>`;

  // Compact day summary
  const pProt=Math.min(100,tProt?Math.round(eaten.protein/tProt*100):0);
  const pCarbs=Math.min(100,tCarbs?Math.round(eaten.carbs/tCarbs*100):0);
  const pFat=Math.min(100,tFat?Math.round(eaten.fat/tFat*100):0);
  const kcalColor=eaten.kcal>tKcal*1.1?'var(--red)':eaten.kcal>=tKcal*0.75?'var(--green)':'var(--text)';
  // Donitsikaavio P/HH/R
  const pCal=eaten.protein*4, cCal=eaten.carbs*4, fCal=eaten.fat*9;
  const totalMacroCal=pCal+cCal+fCal||1;
  const donutSvg=(()=>{
    const r=28,cx=32,cy=32,circum=2*Math.PI*r;
    let offset=0;
    const slice=(val,color)=>{const dash=(val/totalMacroCal)*circum;const s=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="8" stroke-dasharray="${dash} ${circum}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;offset+=dash;return s;};
    const pSlice=slice(pCal,'#4b8be8');
    const cSlice=slice(cCal,'#e8b84b');
    const fSlice=slice(fCal,'#4caf7a');
    return `<svg class="dds-donut" width="64" height="64" viewBox="0 0 64 64">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2a2a2a" stroke-width="8"/>
      ${eaten.kcal>0?pSlice+cSlice+fSlice:''}
      <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="700" fill="#f0f0f0">${eaten.kcal>0?Math.round(pCal/totalMacroCal*100)+'%':''}</text>
    </svg>`;
  })();
  const daySummaryHtml=`<div class="diary-day-summary">
    ${donutSvg}
    <div>
      <div class="dds-kcal" style="color:${kcalColor}">${eaten.kcal}<small>/ ${tKcal} kcal</small></div>
    </div>
    <div class="dds-macros">
      <div class="dds-bar-row"><span class="dds-bar-label" style="color:var(--blue)">P</span><div class="dds-bar"><div class="dds-bar-fill" style="width:${pProt}%;background:var(--blue)"></div></div><span class="dds-bar-pct">${eaten.protein}g</span></div>
      <div class="dds-bar-row"><span class="dds-bar-label" style="color:var(--accent)">HH</span><div class="dds-bar"><div class="dds-bar-fill" style="width:${pCarbs}%;background:var(--accent)"></div></div><span class="dds-bar-pct">${eaten.carbs}g</span></div>
      <div class="dds-bar-row"><span class="dds-bar-label" style="color:var(--green)">R</span><div class="dds-bar"><div class="dds-bar-fill" style="width:${pFat}%;background:var(--green)"></div></div><span class="dds-bar-pct">${eaten.fat}g</span></div>
    </div>
  </div>`;

function generateWeeklyReport(){
  const today=todayISO();
  const weekDays=[];
  for(let i=6;i>=0;i--) weekDays.push(shiftDate(today,-i));

  let totalKcal=0,totalP=0,totalC=0,totalF=0,daysWithEntries=0;
  weekDays.forEach(d=>{
    const day=state.diary[d];
    if(day && (Object.keys(day.eaten||{}).length>0 || (day.freeEntries||[]).length>0)){
      daysWithEntries++;
      const e=calcDiaryEaten(d);
      totalKcal+=e.kcal; totalP+=e.protein; totalC+=e.carbs; totalF+=e.fat;
    }
  });

  const avgDays=Math.max(1,daysWithEntries);
  const avgKcal=Math.round(totalKcal/avgDays);
  const avgP=Math.round(totalP/avgDays);
  const avgC=Math.round(totalC/avgDays);
  const avgF=Math.round(totalF/avgDays);
  const adherence=Math.round((daysWithEntries/7)*100);

  // Weight change this week
  const weekLog=state.weightLog.filter(w=>weekDays.includes(w.date));
  let weightChange='Ei dataa';
  if(weekLog.length>=2){
    const diff=weekLog[weekLog.length-1].weight-weekLog[0].weight;
    weightChange=(diff>0?'+':'')+diff.toFixed(1)+' kg';
  }

  // Rule-based analysis
  const m=state.profile?.macros||{kcal:2000,protein:150,carbs:200,fat:70};
  let analysis='';
  if(adherence<50) analysis='Kirjaa aterioita säännöllisemmin saadaksesi tarkemman kuvan ravinnosta.';
  else if(avgP<m.protein*0.8) analysis='Proteiinin saanti jää alle tavoitteen. Lisää proteiinipitoisia aterioita.';
  else if(avgKcal>m.kcal*1.1) analysis='Kalorit ylittävät tavoitteen keskimäärin. Tarkista annoskoot.';
  else if(avgKcal<m.kcal*0.8) analysis='Kalorit jäävät alle tavoitteen. Varmista riittävä energiansaanti.';
  else analysis='Hienoa työtä! Makrot ovat lähellä tavoitteita. Jatka samaan malliin!';

  return {avgKcal,avgP,avgC,avgF,adherence,weightChange,daysWithEntries,analysis};
}

// ── Määrien parsiminen ja yhdistely ──
function parseAmount(str){
  if(!str) return {value:null,unit:str||''};
  const s=str.trim();
  // "80g", "3dl", "1rkl" — numero + yksikkö suoraan kiinni
  let m=s.match(/^(\d+(?:[.,]\d+)?)\s*([a-zA-ZäöåÄÖÅ]+)$/);
  if(m) return {value:parseFloat(m[1].replace(',','.')),unit:m[2].toLowerCase()};
  // "2 kpl", "1 rkl" — numero + välilyönti + yksikkö
  m=s.match(/^(\d+(?:[.,]\d+)?)\s+(\S+)$/);
  if(m) return {value:parseFloat(m[1].replace(',','.')),unit:m[2].toLowerCase()};
  return {value:null,unit:s};
}

function mergeAmounts(amounts){
  if(!amounts.length) return '';
  if(amounts.length===1) return amounts[0];
  const parsed=amounts.map(parseAmount);
  const units=[...new Set(parsed.map(p=>p.unit))];
  if(units.length===1 && parsed.every(p=>p.value!==null)){
    const sum=parsed.reduce((s,p)=>s+p.value,0);
    const fmt=sum%1===0?sum.toString():sum.toFixed(1);
    return fmt+units[0];
  }
  // Ei voi yhdistää — näytä uniikkeina
  const unique=[...new Set(amounts)];
  return unique.join(' + ');
}

// ── Kategoriointi ──
function guessIngredientCat(name){
  const n=name.toLowerCase();
  if(/kana|naudan|porsaan|kalkkuna|jauheliha|liha/.test(n)) return 'Liha';
  if(/lohi|tonnikala|kirjolohi|sei|katkarapu|kala/.test(n)) return 'Kala';
  if(/riisi|pasta|leipä|baageli|quinoa|kaura|tortilla|hiutaleet|vehnä/.test(n)) return 'Vilja';
  if(/maito|jogurtti|rahka|raejuusto|juusto|feta|kerma|proteiinijauhe|voi|kvark/.test(n)) return 'Maitotuotteet';
  if(/banaani|mansikka|mustikka|omena|persikka|sitruuna|marjat|avokado|hedelmä/.test(n)) return 'Hedelmät';
  if(/parsakaali|pinaatti|paprika|tomaatti|kurkku|sipuli|kesäkurpitsa|porkkana|peruna|bataatti|rucula|lehtikaali|salaatti/.test(n)) return 'Kasvikset';
  if(/manteli|pähkinä|pellava|saksanpähkinä|cashew|siemen/.test(n)) return 'Pähkinät';
  if(/kikherne|linssit|tofu|mustapapu|papu/.test(n)) return 'Palkokasvit';
  if(/öljy|oliiviöljy|kookosöljy/.test(n)) return 'Öljyt & mausteet';
  if(/hunaja|sokeri|siirapit|maple/.test(n)) return 'Öljyt & mausteet';
  return 'Muut';
}

// ── Listan generointi ──
function generateShoppingList(mode){
  mode=mode||shoppingMode;
  const items={};
  state.mealPlan.forEach((meal,mi)=>{
    const opt=meal.options[state.selectedOptions[mi]||0];
    if(!opt||!opt.ingredients) return;
    const multiplier=(mode==='week')?7:1;
    opt.ingredients.forEach(ing=>{
      const key=ing.n.toLowerCase().trim();
      if(!items[key]) items[key]={name:ing.n,amounts:[],cat:guessIngredientCat(ing.n)};
      for(let x=0;x<multiplier;x++) items[key].amounts.push(ing.a);
    });
  });
  const result={};
  Object.values(items).forEach(item=>{
    if(!result[item.cat]) result[item.cat]=[];
    result[item.cat].push({name:item.name,amount:mergeAmounts(item.amounts)});
  });
  return result;
}

// ── Render ──
async function renderShoppingList(mode){
  if(mode) shoppingMode=mode;
  shoppingChecked=(await load('shoppingChecked'))||{};
  shoppingCustomItems=(await load('shoppingCustomItems'))||[];

      list[cat].forEach((item,i)=>{
        const key=cat+'-'+i;

        html+=`<div class="shopping-item">
          <button class="shopping-check ${checked?'checked':''}" onclick="toggleShoppingItem('${sanitize(key)}')">${checked?'✓':''}</button>
          <span class="shopping-item-name ${checked?'bought':''}">${sanitize(item.name)} <span style="color:var(--text3);font-size:12px;">— ${sanitize(item.amount)}</span></span>
        </div>`;
      });
    });
  }

  // Omat lisäykset
  html+=`<div class="shopping-cat" style="margin-top:${cats.length?'0':'8px'};">Omat lisäykset</div>`;
  if(shoppingCustomItems.length){
    shoppingCustomItems.forEach((item,i)=>{
      const key='custom-'+i;
      const checked=shoppingChecked[key];
      html+=`<div class="shopping-item">
        <button class="shopping-check ${checked?'checked':''}" onclick="toggleShoppingItem('${sanitize(key)}')">${checked?'✓':''}</button>
        <span class="shopping-item-name ${checked?'bought':''}">${sanitize(item)}</span>

      </div>`;
    });
  } else {
    html+=`<div style="font-size:13px;color:var(--text3);padding:6px 0 4px;">Ei omia tuotteita</div>`;
  }
  html+=`<div class="sl-custom-input-row">
    <input class="sl-custom-input" id="sl-custom-input" type="text" placeholder="Lisää tuote..." onkeydown="if(event.key==='Enter')addShoppingCustomItem()">
    <button class="sl-custom-add" onclick="addShoppingCustomItem()">+ Lisää</button>
  </div>`;
  html+=`<button class="shopping-close" onclick="closeShoppingModal()">Sulje</button>`;
  content.innerHTML=html;

async function toggleShoppingItem(key){
  shoppingChecked[key]=!shoppingChecked[key];
  await save('shoppingChecked',shoppingChecked);
  renderShoppingList();
}

async function clearShoppingChecked(){
  shoppingChecked={};
  await save('shoppingChecked',shoppingChecked);
  renderShoppingList();
  showToast('Valinnat tyhjennetty','success');
}

async function addShoppingCustomItem(){
  const input=document.getElementById('sl-custom-input');
  const val=input?.value.trim();
  if(!val){showToast('Kirjoita tuotteen nimi','error');return;}
  shoppingCustomItems.push(val);
  await save('shoppingCustomItems',shoppingCustomItems);
  renderShoppingList();
}

async function removeShoppingCustomItem(i){
  shoppingCustomItems.splice(i,1);
  await save('shoppingCustomItems',shoppingCustomItems);
  renderShoppingList();
}

async function copyShoppingList(){
  const list=generateShoppingList(shoppingMode);
  const cats=Object.keys(list).sort();
  const modeLabel=shoppingMode==='day'?'Tänään':'Viikko';
  let text=`🛒 OSTOSLISTA — ${modeLabel}\n${'─'.repeat(28)}\n\n`;
  cats.forEach(cat=>{
    text+=`${cat.toUpperCase()}\n`;
    list[cat].forEach(item=>{
      const ck=Object.entries(shoppingChecked).find(([k])=>k.includes(item.name.substring(0,5).toLowerCase()));
      text+=`${ck&&ck[1]?'✓':'□'} ${item.name} — ${item.amount}\n`;
    });
    text+='\n';
  });
  if(shoppingCustomItems.length){
    text+=`OMAT LISÄYKSET\n`;
    shoppingCustomItems.forEach(item=>{text+=`□ ${item}\n`;});
  }
  try{
    await navigator.clipboard.writeText(text);
    showToast('Lista kopioitu leikepöydälle 📋','success');
  }catch(e){
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.top='-9999px';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Lista kopioitu leikepöydälle 📋','success');
  }
}

function closeShoppingModal(e){
  if(!e||e.target===document.getElementById('shopping-modal'))
    document.getElementById('shopping-modal').style.display='none';
}

let deferredPWAPrompt=null;

function registerPWA(){
  try{
    // Create manifest via blob URL
    const manifest={
      name:'Ravinto',
      short_name:'Ravinto',
      description:'Ravinto-ohjelma',
      start_url:location.href,
      display:'standalone',
      background_color:'#111111',
      theme_color:'#111111',
      icons:[{
        src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23111"/><text x="50" y="65" font-size="50" text-anchor="middle" fill="%23e8b84b">🥗</text></svg>'),
        sizes:'192x192',
        type:'image/svg+xml'
      },{
        src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23111"/><text x="50" y="65" font-size="50" text-anchor="middle" fill="%23e8b84b">🥗</text></svg>'),
        sizes:'512x512',
        type:'image/svg+xml'
      }]
    };
    const manifestBlob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    const manifestUrl=URL.createObjectURL(manifestBlob);
    const link=document.createElement('link');
    link.rel='manifest';
    link.href=manifestUrl;
    document.head.appendChild(link);

    // Create service worker via blob URL
    const swCode=`
      const CACHE_NAME='ravinto-v1';
      self.addEventListener('install',e=>{self.skipWaiting();});
      self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});
      self.addEventListener('fetch',e=>{
        e.respondWith(
          caches.match(e.request).then(r=>r||fetch(e.request).then(resp=>{
            if(resp.status===200){
              const clone=resp.clone();
              caches.open(CACHE_NAME).then(c=>c.put(e.request,clone));
            }
            return resp;
          }).catch(()=>caches.match(e.request)))
        );
      });
    `;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(swBlob);

    if('serviceWorker' in navigator){
      navigator.serviceWorker.register(swUrl,{scope:'/'}).catch(()=>{});
    }

    // Listen for install prompt
    window.addEventListener('beforeinstallprompt',e=>{
      e.preventDefault();
      deferredPWAPrompt=e;
      const btn=document.getElementById('pwa-install');
      if(btn) btn.style.display='block';
    });
  }catch(e){
    console.log('PWA registration skipped:',e.message);
  }
}

function installPWA(){
  if(deferredPWAPrompt){
    deferredPWAPrompt.prompt();
    deferredPWAPrompt.userChoice.then(()=>{
      deferredPWAPrompt=null;
      const btn=document.getElementById('pwa-install');
      if(btn) btn.style.display='none';
    });
  }
}

function setupOfflineDetection(){
  function updateBadge(){
    const badge=document.getElementById('offline-badge');
    if(badge) badge.className='offline-badge'+(navigator.onLine?'':' show');
  }
  window.addEventListener('online',updateBadge);
  window.addEventListener('offline',updateBadge);
  updateBadge();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init(){
  // Register PWA
  try{registerPWA();}catch(e){}
  setupOfflineDetection();

  const profile=await load('profile');
  if(profile){
    state.profile=profile;
    state.mealPlan=await load('mealPlan')||generateMealPlan(profile);
    state.selectedOptions=await load('selectedOptions')||state.mealPlan.map(()=>0);
    state.weightLog=await load('weightLog')||[];
    state.trainingDay=(await load('trainingDay'))===true;
    state.diary=await load('diary')||{};
    state.waterLog=await load('waterLog')||{};
    state.favorites=await load('favorites')||[];
    state.viewDate=await load('viewDate')||todayISO();
    state.currentDate=todayISO();
    // Päivitä toggle-UI ladatun tilan mukaan
    const sw=document.getElementById('tt-switch');
    const lbl=document.getElementById('tt-label');
    if(sw) sw.className='tt-switch'+(state.trainingDay?' on':'');
    if(lbl) lbl.textContent=state.trainingDay?'Treenipäivä':'Lepopäivä';
    switchTab('program');showMainApp();
  } else {
    document.querySelector('.tab-bar').style.display='none';
    state.obStep=1;renderOnboarding();
  }
}

init();
</script>
