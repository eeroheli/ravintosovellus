    bodyHtml=`<div class="dam-search-wrap">
      <span class="dam-search-icon">🔍</span>
      <input class="dam-search-input" id="diary-search-input" placeholder="Hae ainesosaa..." oninput="diarySearch(this.value)" autocomplete="off">
    </div>
    <div id="diary-search-results" class="dam-search-results">
      <div style="padding:12px 0;text-align:center;color:var(--text3);font-size:13px;">Kirjoita vähintään 2 merkkiä...</div>
    </div>`;
  }

  // Manual tab
  if(diaryAddTab==='manual'){
    bodyHtml=`<div class="dam-manual-field">
      <label class="dam-manual-label">Nimi *</label>
      <input id="dam-m-name" placeholder="esim. Ravintola-ateria">
    </div>
    <div class="dam-manual-row">
      <div><label class="dam-manual-label">kcal *</label><input id="dam-m-kcal" type="number" placeholder="500"></div>
      <div><label class="dam-manual-label">Prot (g)</label><input id="dam-m-prot" type="number" placeholder="30"></div>
      <div><label class="dam-manual-label">HH (g)</label><input id="dam-m-carbs" type="number" placeholder="50"></div>
      <div><label class="dam-manual-label">Rasva (g)</label><input id="dam-m-fat" type="number" placeholder="20"></div>
    </div>
    <button class="dam-save-btn" onclick="saveDiaryManual()">Lisää ateria</button>`;
  }

  document.getElementById('diary-add-modal-content').innerHTML=`
    <div class="dam-header">
      <div class="dam-title">Lisää — ${sanitize(slotLabel)}</div>
      <button class="dam-close" onclick="closeDiaryAddModal()">✕</button>
    </div>
    <div class="dam-tabs">
      <button class="dam-tab ${diaryAddTab==='plan'?'active':''}" onclick="setDiaryAddTab('plan')">Ohjelma</button>
      <button class="dam-tab ${diaryAddTab==='search'?'active':''}" onclick="setDiaryAddTab('search')">Hae tuote</button>
      <button class="dam-tab ${diaryAddTab==='manual'?'active':''}" onclick="setDiaryAddTab('manual')">Manuaalinen</button>
    </div>
    ${bodyHtml}`;

  if(diaryAddTab==='search') setTimeout(()=>document.getElementById('diary-search-input')?.focus(),100);
}

function diarySearch(query){
  const results=document.getElementById('diary-search-results');
  if(!query||query.length<2){
    results.innerHTML='<div style="padding:12px 0;text-align:center;color:var(--text3);font-size:13px;">Kirjoita vähintään 2 merkkiä...</div>';
    return;
  }
  const q=query.toLowerCase();
  const local=AINESOSA_DB.map((a,i)=>({...a,idx:i})).filter(a=>a.name.toLowerCase().includes(q)).slice(0,8);
  if(!local.length){results.innerHTML='<div style="padding:12px 0;text-align:center;color:var(--text3);font-size:13px;">Ei tuloksia</div>';return;}
  results.innerHTML=local.map(a=>`
    <div class="dam-search-result" onclick="addDiaryFromDB(${a.idx})">
      <div><div class="dam-sr-name">${sanitize(a.name)}</div><div class="dam-sr-cat">${sanitize(a.cat)} · per 100g</div></div>
      <div class="dam-sr-macros">${a.kcal} kcal<br>${a.protein}g P</div>
    </div>`).join('');
}

async function addDiaryFromPlan(mealIdx){
  const meal=state.mealPlan[mealIdx]; if(!meal) return;
  const opt=meal.options[state.selectedOptions[mealIdx]||0]; if(!opt) return;
  const dateStr=state.currentDate||todayISO();
  const day=ensureDiaryDay(dateStr);
  day.slots[diaryAddTarget].push({name:opt.name,emoji:opt.emoji||'🍽️',kcal:Math.round(opt.kcal||0),protein:Math.round(opt.protein||0),carbs:Math.round(opt.carbs||0),fat:Math.round(opt.fat||0)});
  await save('diary',state.diary);
  closeDiaryAddModal();
  renderDiaryTab();
  if(dateStr===todayISO()) renderMacroStrip();
  showToast('Lisätty!','success');
}

async function addDiaryFromDB(dbIdx){
  const a=AINESOSA_DB[dbIdx]; if(!a) return;
  const dateStr=state.currentDate||todayISO();
  const day=ensureDiaryDay(dateStr);
  day.slots[diaryAddTarget].push({name:a.name+' (100g)',emoji:'🍽️',kcal:a.kcal,protein:a.protein,carbs:a.carbs,fat:a.fat});
  await save('diary',state.diary);
  closeDiaryAddModal();
  renderDiaryTab();
  if(dateStr===todayISO()) renderMacroStrip();
  showToast('Lisätty!','success');
}

async function saveDiaryManual(){
  const name=document.getElementById('dam-m-name')?.value.trim();
  const kcal=parseFloat(document.getElementById('dam-m-kcal')?.value)||0;
  const protein=parseFloat(document.getElementById('dam-m-prot')?.value)||0;
  const carbs=parseFloat(document.getElementById('dam-m-carbs')?.value)||0;
  const fat=parseFloat(document.getElementById('dam-m-fat')?.value)||0;
  if(!name){showToast('Syötä nimi','error');return;}
  if(!kcal){showToast('Syötä kalorit','error');return;}
  const dateStr=state.currentDate||todayISO();
  const day=ensureDiaryDay(dateStr);
  day.slots[diaryAddTarget].push({name,emoji:'🍽️',kcal:Math.round(kcal),protein:Math.round(protein),carbs:Math.round(carbs),fat:Math.round(fat)});
  await save('diary',state.diary);
  closeDiaryAddModal();
  renderDiaryTab();
  if(dateStr===todayISO()) renderMacroStrip();
  showToast('Lisätty!','success');
}

async function removeDiarySlotItem(slotKey,idx){
  const dateStr=state.currentDate||todayISO();
  const day=state.diary[dateStr];
  if(!day?.slots?.[slotKey]) return;
  day.slots[slotKey].splice(idx,1);
  await save('diary',state.diary);
  renderDiaryTab();
  if(dateStr===todayISO()) renderMacroStrip();
}

  const [y,m]=calViewMonth.split('-').map(Number);
  const d=new Date(y,m-1+dir,1);
  calViewMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

}
function selectCalDay(dateStr){
  state.currentDate=dateStr;

function renderCalModal(){

  const firstDow=new Date(y,m-1,1).getDay();
  const offset=firstDow===0?6:firstDow-1;
  const daysInMonth=new Date(y,m,0).getDate();

  let cells='';
  for(let i=0;i<offset;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const eaten=calcDiaryEaten(dateStr);
    const hasData=eaten.kcal>0;
    let dotClass='none';
    if(hasData){const pct=eaten.kcal/targetKcal;dotClass=pct>=0.85&&pct<=1.15?'green':pct>1.15?'red':'yellow';}
    const isToday=dateStr===today;

    cells+=`<div class="cal-cell ${isToday?'today-cell':''} ${isSel?'selected-cell':''}" onclick="selectCalDay('${dateStr}')">

  const wn=Math.max(1,wN);

    <div style="margin-bottom:10px;display:flex;gap:12px;font-size:11px;color:var(--text3);">

      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:4px;"></span>Alle tavoitteen</span>

// PHASE 3: WEEKLY REPORT

function generateWeeklyReport(){
  const today=todayISO();
  const weekDays=[];
  for(let i=6;i>=0;i--) weekDays.push(shiftDate(today,-i));

  let totalKcal=0,totalP=0,totalC=0,totalF=0,daysWithEntries=0;
  weekDays.forEach(d=>{
    const day=state.diary[d];
    if(day && (Object.keys(day.eaten||{}).length>0 || (day.freeEntries||[]).length>0)){
      daysWithEntries++;
      const e=calcDiaryEaten(d);
      totalKcal+=e.kcal; totalP+=e.protein; totalC+=e.carbs; totalF+=e.fat;
    }
  });

  const avgDays=Math.max(1,daysWithEntries);
  const avgKcal=Math.round(totalKcal/avgDays);
  const avgP=Math.round(totalP/avgDays);
  const avgC=Math.round(totalC/avgDays);
  const avgF=Math.round(totalF/avgDays);
  const adherence=Math.round((daysWithEntries/7)*100);

  // Weight change this week
  const weekLog=state.weightLog.filter(w=>weekDays.includes(w.date));
  let weightChange='Ei dataa';
  if(weekLog.length>=2){
    const diff=weekLog[weekLog.length-1].weight-weekLog[0].weight;
    weightChange=(diff>0?'+':'')+diff.toFixed(1)+' kg';
  }

  // Rule-based analysis
  const m=state.profile?.macros||{kcal:2000,protein:150,carbs:200,fat:70};
  let analysis='';
  if(adherence<50) analysis='Kirjaa aterioita säännöllisemmin saadaksesi tarkemman kuvan ravinnosta.';
  else if(avgP<m.protein*0.8) analysis='Proteiinin saanti jää alle tavoitteen. Lisää proteiinipitoisia aterioita.';
  else if(avgKcal>m.kcal*1.1) analysis='Kalorit ylittävät tavoitteen keskimäärin. Tarkista annoskoot.';
  else if(avgKcal<m.kcal*0.8) analysis='Kalorit jäävät alle tavoitteen. Varmista riittävä energiansaanti.';
  else analysis='Hienoa työtä! Makrot ovat lähellä tavoitteita. Jatka samaan malliin!';

  return {avgKcal,avgP,avgC,avgF,adherence,weightChange,daysWithEntries,analysis};
}

function renderWeeklyReport(){
  const r=generateWeeklyReport();

let shoppingChecked={};

function generateShoppingList(){
  const items={};
  state.mealPlan.forEach((meal,mi)=>{
    const opt=meal.options[state.selectedOptions[mi]||0];
    if(!opt||!opt.ingredients) return;
    opt.ingredients.forEach(ing=>{
      const key=ing.n.toLowerCase().trim();
      if(!items[key]){
        items[key]={name:ing.n, amounts:[], cat:guessIngredientCat(ing.n)};
      }
      items[key].amounts.push(ing.a);
    });
  });

  // Multiply by 7 for weekly
  const result={};
  Object.values(items).forEach(item=>{
    if(!result[item.cat]) result[item.cat]=[];
    const amountStr=item.amounts[0]+(item.amounts.length>1?` (x${item.amounts.length})`:'')+' x7';
    result[item.cat].push({name:item.name, amount:amountStr});
  });
  return result;
}

function guessIngredientCat(name){
  const n=name.toLowerCase();
  if(/kana|naudan|porsaan|kalkkunna|jauheliha/.test(n)) return 'Liha';
  if(/lohi|tonnikala|kirjolohi|sei|katkarapu|kala/.test(n)) return 'Kala';
  if(/riisi|pasta|leipä|baageli|quinoa|kaura|tortilla|hiutaleet/.test(n)) return 'Vilja';
  if(/maito|jogurtti|rahka|raejuusto|juusto|feta|kerma|proteiinijauhe|voi/.test(n)) return 'Maitotuotteet';
  if(/banaani|mansikka|mustikka|omena|persikka|sitruuna|marjat|avokado/.test(n)) return 'Hedelmät';
  if(/parsakaali|pinaatti|paprika|tomaatti|kurkku|sipuli|kesäkurpitsa|porkkana|peruna|bataatti|rucula|lehtikaali/.test(n)) return 'Kasvikset';
  if(/manteli|pähkinä|pellava|saksanpähkinä/.test(n)) return 'Pähkinät';
  if(/kikherne|linssit|tofu|mustapapu/.test(n)) return 'Palkokasvit';
  return 'Muut';
}

function renderShoppingList(){
  const list=generateShoppingList();
  const cats=Object.keys(list).sort();
  const content=document.getElementById('shopping-modal-content');
  let html=`<div class="shopping-title">🛒 Ostoslista (viikko)</div>`;
  cats.forEach(cat=>{
    html+=`<div class="shopping-cat">${sanitize(cat)}</div>`;
    list[cat].forEach((item,i)=>{
      const key=cat+'-'+i;
      const checked=shoppingChecked[key];
      html+=`<div class="shopping-item">
        <button class="shopping-check ${checked?'checked':''}" onclick="toggleShoppingItem('${sanitize(key)}')">${checked?'✓':''}</button>
        <span class="shopping-item-name ${checked?'bought':''}">${sanitize(item.name)} — ${sanitize(item.amount)}</span>
      </div>`;
    });
  });
  html+=`<button class="shopping-close" onclick="closeShoppingModal()">Sulje</button>`;
  content.innerHTML=html;
  document.getElementById('shopping-modal').style.display='flex';
}

function toggleShoppingItem(key){
  shoppingChecked[key]=!shoppingChecked[key];
  renderShoppingList();
}

function closeShoppingModal(e){
  if(!e||e.target===document.getElementById('shopping-modal'))
    document.getElementById('shopping-modal').style.display='none';
}

  const m=state.profile?.macros||{kcal:2000,protein:150,carbs:200,fat:70};

  if(!navigator.onLine){
    area.innerHTML=`<div class="restaurant-suggestion">
      <div class="restaurant-suggestion-title">💡 Ehdotus (offline)</div>

  area.innerHTML=`<div style="padding:12px;color:var(--text2);font-size:13px;"><span class="spinner"></span> Generoidaan ehdotusta...</div>`;

  try{
    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:500,
        system:"Olet suomalainen ravintoneuvoja. Anna lyhyt, konkreettinen ravintolasuositus suomeksi. Vastaa 2-4 lauseella.",
        messages:[{role:"user",content:`Olen ravintolassa: ${restName}. Minulla on jäljellä päivän makroista: ${remKcal} kcal, ${remP}g proteiinia, ${Math.max(0,m.carbs-eaten.carbs)}g hiilihydraatteja, ${Math.max(0,m.fat-eaten.fat)}g rasvaa. Mitä minun kannattaisi tilata?`}],
      })
    });
    if(!response.ok) throw new Error('API error');
    const data=await response.json();
    const text=data.content?.map(c=>c.text||'').join('')||'';
    area.innerHTML=`<div class="restaurant-suggestion">
      <div class="restaurant-suggestion-title">✨ AI-ehdotus</div>
      <div class="restaurant-suggestion-text">${sanitizeNL(text)}</div>

    area.innerHTML=`<div class="restaurant-suggestion">
      <div class="restaurant-suggestion-title">💡 Ehdotus</div>
      <div class="restaurant-suggestion-text">Valitse proteiinipitoinen pääruoka, vältä rasvaisia lisukkeita. Tavoittele noin ${remKcal} kcal ja ${remP}g proteiinia. Hyviä valintoja: grillattua kanaa tai kalaa, salaatti lisukkeena, riisi tai peruna.</div>
    </div>`;
  }
}

function closeRestaurantModal(e){
  if(!e||e.target===document.getElementById('restaurant-modal'))
    document.getElementById('restaurant-modal').style.display='none';
}

// ═══════════════════════════════════════════
// PHASE 4: PWA + OFFLINE
// ═══════════════════════════════════════════
let deferredPWAPrompt=null;

function registerPWA(){
  try{
    // Create manifest via blob URL
    const manifest={
      name:'Ravinto',
      short_name:'Ravinto',
      description:'Ravinto-ohjelma',
      start_url:location.href,
      display:'standalone',
      background_color:'#111111',
      theme_color:'#111111',
      icons:[{
        src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23111"/><text x="50" y="65" font-size="50" text-anchor="middle" fill="%23e8b84b">🥗</text></svg>'),
        sizes:'192x192',
        type:'image/svg+xml'
      },{
        src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23111"/><text x="50" y="65" font-size="50" text-anchor="middle" fill="%23e8b84b">🥗</text></svg>'),
        sizes:'512x512',
        type:'image/svg+xml'
      }]
    };
    const manifestBlob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    const manifestUrl=URL.createObjectURL(manifestBlob);
    const link=document.createElement('link');
    link.rel='manifest';
    link.href=manifestUrl;
    document.head.appendChild(link);

    // Create service worker via blob URL
    const swCode=`
      const CACHE_NAME='ravinto-v1';
      self.addEventListener('install',e=>{self.skipWaiting();});
      self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});
      self.addEventListener('fetch',e=>{
        e.respondWith(
          caches.match(e.request).then(r=>r||fetch(e.request).then(resp=>{
            if(resp.status===200){
              const clone=resp.clone();
              caches.open(CACHE_NAME).then(c=>c.put(e.request,clone));
            }
            return resp;
          }).catch(()=>caches.match(e.request)))
        );
      });
    `;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(swBlob);

    if('serviceWorker' in navigator){
      navigator.serviceWorker.register(swUrl,{scope:'/'}).catch(()=>{});
    }

    // Listen for install prompt
    window.addEventListener('beforeinstallprompt',e=>{
      e.preventDefault();
      deferredPWAPrompt=e;
      const btn=document.getElementById('pwa-install');
      if(btn) btn.style.display='block';
    });
  }catch(e){
    console.log('PWA registration skipped:',e.message);
  }
}

function installPWA(){
  if(deferredPWAPrompt){
    deferredPWAPrompt.prompt();
    deferredPWAPrompt.userChoice.then(()=>{
      deferredPWAPrompt=null;
      const btn=document.getElementById('pwa-install');
      if(btn) btn.style.display='none';
    });
  }
}

function setupOfflineDetection(){
  function updateBadge(){
    const badge=document.getElementById('offline-badge');
    if(badge) badge.className='offline-badge'+(navigator.onLine?'':' show');
  }
  window.addEventListener('online',updateBadge);
  window.addEventListener('offline',updateBadge);
  updateBadge();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init(){
  // Register PWA
  try{registerPWA();}catch(e){}
  setupOfflineDetection();

  const profile=await load('profile');
  if(profile){
    state.profile=profile;
    state.mealPlan=await load('mealPlan')||generateMealPlan(profile);
    state.selectedOptions=await load('selectedOptions')||state.mealPlan.map(()=>0);
    state.weightLog=await load('weightLog')||[];
    state.trainingDay=(await load('trainingDay'))===true;
    state.diary=await load('diary')||{};
    state.viewDate=await load('viewDate')||todayISO();
    state.currentDate=todayISO();
    // Päivitä toggle-UI ladatun tilan mukaan
    const sw=document.getElementById('tt-switch');
    const lbl=document.getElementById('tt-label');
    if(sw) sw.className='tt-switch'+(state.trainingDay?' on':'');
    if(lbl) lbl.textContent=state.trainingDay?'Treenipäivä':'Lepopäivä';
    switchTab('program');showMainApp();
  } else {
    state.obStep=1;renderOnboarding();
  }
}

init();
</script>
